// Even/odd calendar-day dates for a given month
function parityDatesForMonth(year,monthIdx,parity){
  const days=new Date(year,monthIdx+1,0).getDate();
  const want=parity==="even";
  const out=[];
  for(let d=1;d<=days;d++){ if(want===(d%2===0)) out.push(iso(year,monthIdx,d)); }
  return out;
}
// Completion % — partial counts as half
function pct(done,partial,missed){
  const total=done+partial+missed;
  return total?Math.round(((done+0.5*partial)/total)*100):0;
}
// Reference date for a report: today if viewing the live month, else end of that month
function refDateFor(month,year){
  const now=new Date();
  if(month===now.getMonth()&&year===now.getFullYear()) return now;
  return new Date(year,month+1,0);
}
function rangeWindow(kind,ref=new Date()){
  const end=new Date(ref); end.setHours(23,59,59,999);
  const start=new Date(ref); start.setHours(0,0,0,0);
  if(kind==="week"){ const dow=(start.getDay()+6)%7; start.setDate(start.getDate()-dow); }
  else if(kind==="month"){ start.setDate(1); }
  else if(kind==="3mo"){ start.setMonth(start.getMonth()-2,1); }
  else if(kind==="6mo"){ start.setMonth(start.getMonth()-5,1); }
  return {start,end};
}
const inRange=(dateISO,win)=>{ const d=new Date(dateISO+"T12:00:00"); return d>=win.start&&d<=win.end; };
const shortDate=(dateISO,lang="en")=>{ const d=new Date(dateISO+"T12:00:00"); return `${(lang==="uz"?MONTHS_UZ:MONTHS)[d.getMonth()].slice(0,3)} ${d.getDate()}`; };
// Does this person still exist in any group across any month?
const pidExists=(groups,pid)=>groups.some(g=>g.students.some(st=>(st.pid||st.id)===pid));
// One entry per unique person (latest month wins), with their current group + payment status
function rosterByPid(groups){
  const sorted=groups.slice().sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  const m={};
  sorted.forEach(g=>g.students.forEach(st=>{
    const pid=st.pid||st.id;
    const due=st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
    const paid=st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
    m[pid]={pid,name:st.name,groupName:g.name,month:g.month,year:g.year,paidFull:due>0&&paid>=due};
  }));
  return m;
}
// Aggregate homework across every group sharing a name, within a date window
function groupReport(groups,perf,groupName,win){
  const lessons=[]; const perStudent={};
  groups.filter(g=>g.name===groupName).forEach(g=>{
    const gp=perf[g.id]; if(!gp)return;
    const nameByPid={}; g.students.forEach(st=>nameByPid[st.pid||st.id]=st.name);
    Object.entries(gp.lessons||{}).forEach(([date,ls])=>{
      if(!inRange(date,win))return;
      let d=0,p=0,m=0;
      Object.entries(ls.records||{}).forEach(([pid,v])=>{
        if(!perStudent[pid])perStudent[pid]={pid,name:nameByPid[pid]||"?",done:0,partial:0,missed:0};
        if(v==="done"){d++;perStudent[pid].done++;}
        else if(v==="partial"){p++;perStudent[pid].partial++;}
        else if(v==="missed"){m++;perStudent[pid].missed++;}
      });
      if(d+p+m>0)lessons.push({date,done:d,partial:p,missed:m});
    });
  });
  lessons.sort((a,b)=>a.date.localeCompare(b.date));
  const totals=lessons.reduce((t,l)=>({done:t.done+l.done,partial:t.partial+l.partial,missed:t.missed+l.missed}),{done:0,partial:0,missed:0});
  return {lessons,perStudent:Object.values(perStudent),totals};
}
// One person's homework history within a window
function studentReport(groups,perf,pid,win){
  const lessons=[];
  groups.forEach(g=>{
    const gp=perf[g.id]; if(!gp)return;
    if(!g.students.some(st=>(st.pid||st.id)===pid))return;
    Object.entries(gp.lessons||{}).forEach(([date,ls])=>{
      if(!inRange(date,win))return;
      lessons.push({date,homework:(ls.homework||gp.defaultHomework||""),status:(ls.records||{})[pid],groupName:g.name});
    });
  });
  lessons.sort((a,b)=>a.date.localeCompare(b.date));
  const totals=lessons.reduce((t,l)=>{ if(l.status==="done")t.done++; else if(l.status==="partial")t.partial++; else if(l.status==="missed")t.missed++; return t; },{done:0,partial:0,missed:0});
  return {lessons,totals};
}

// Simple vector horizontal-bar chart (label + % bar), returns the y below it
function pdfBars(doc,x,y,w,rows){
  const rh=7,bx=x+48,bw=w-48-16;
  rows.forEach((r,i)=>{
    const yy=y+i*rh;
    doc.setFontSize(8);doc.setTextColor(30);
    doc.text(String(r.label).slice(0,24),x,yy+4);
    doc.setFillColor(238,238,242);doc.roundedRect(bx,yy,bw,4.6,1,1,"F");
    const c=r.value>=80?[255,214,0]:r.value>=60?[245,166,35]:[229,72,77];
    doc.setFillColor(c[0],c[1],c[2]);
    doc.roundedRect(bx,yy,Math.max(1,bw*r.value/100),4.6,1,1,"F");
    doc.setTextColor(30);doc.text(`${r.value}%`,bx+bw+2,yy+4);
  });
  return y+rows.length*rh+2;
}
// Simple vector line chart of 0..100 points
function pdfLine(doc,x,y,w,h,pts){
  doc.setDrawColor(228,228,233);doc.setLineWidth(0.2);doc.rect(x,y,w,h);
  doc.setDrawColor(228,228,233);
  [0.5].forEach(f=>doc.line(x,y+h*f,x+w,y+h*f));
  if(pts.length>1){
    doc.setDrawColor(230,192,0);doc.setLineWidth(0.8);
    const step=w/(pts.length-1);
    for(let i=1;i<pts.length;i++) doc.line(x+step*(i-1),y+h-(pts[i-1]/100*h),x+step*i,y+h-(pts[i]/100*h));
    doc.setLineWidth(0.2);
  }
}

function generatePDF(groups, month, year, allMonths, lang=LAST_LANG){
  const L=LABELS[lang]||LABELS.en;
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  doc.setFontSize(16);doc.setFont("helvetica","bold");
  doc.text(`${L.appTitle} — ${monthLabel(month,year,lang)}`,14,16);
  doc.setFontSize(9);doc.setFont("helvetica","normal");
  doc.text(`${L.generated}: ${new Date().toLocaleDateString()}`,14,22);

  const monthGroups=groups.filter(g=>g.month===month&&g.year===year);
  let y=30;

  monthGroups.forEach(g=>{
    const totalDue=g.students.reduce((s,st)=>s+st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0),0);
    const totalPaid=g.students.reduce((s,st)=>s+st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0),0);

    if(y>250){doc.addPage();y=20;}
    doc.setFont("helvetica","bold");doc.setFontSize(12);
    doc.text(g.name,14,y);
    doc.setFont("helvetica","normal");doc.setFontSize(9);
    doc.text(`${L.total}: ${fmt(totalDue)}  |  ${L.collected}: ${fmt(totalPaid)}  |  ${L.remaining}: ${fmt(totalDue-totalPaid)}`,14,y+6);
    y+=12;

    const rows=g.students.map(st=>{
      const due=st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
      const paid=st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
      return[st.name, fmt(due), fmt(paid), fmt(due-paid), paid>=due&&due>0?L.paidStatus:L.unpaidStatus];
    });

    doc.autoTable({
      startY:y, head:[[L.student,L.totalDue,L.paid,L.remaining,L.status]],
      body:rows,
      styles:{fontSize:8,cellPadding:2},
      headStyles:HEAD_STYLE,
      alternateRowStyles:{fillColor:[245,245,245]},
      columnStyles:{4:{halign:"center"}},
      margin:{left:14,right:14},
    });
    y=doc.lastAutoTable.finalY+10;
  });

  doc.addPage();
  doc.setFont("helvetica","bold");doc.setFontSize(14);
  doc.text(`${L.paymentSummaryTitle} — ${monthLabel(month,year,lang)}`,14,20);
  y=30;

  const allPaid=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
  const allDue=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);

  const breakdown={};
  monthGroups.forEach(g=>g.students.forEach(st=>st.payments.filter(p=>p.paid&&p.amount>0).forEach(p=>{ breakdown[p.amount]=(breakdown[p.amount]||0)+1; })));

  doc.autoTable({
    startY:y, head:[[L.metric,L.value]],
    body:[
      [L.totalBilled,fmt(allDue)],
      [L.totalCollected,fmt(allPaid)],
      [L.uncollected,fmt(allDue-allPaid)],
      [`${L.yourIncome} (${TEACHER_PCT}%)`,fmt(allPaid*(TEACHER_PCT/100))],
      [`${L.centerShare} (${100-TEACHER_PCT}%)`,fmt(allPaid*((100-TEACHER_PCT)/100))],
    ],
    styles:{fontSize:10},headStyles:HEAD_STYLE,margin:{left:14,right:14},
  });
  y=doc.lastAutoTable.finalY+10;

  doc.setFont("helvetica","bold");doc.setFontSize(11);
  doc.text(L.paymentBreakdown,14,y);y+=8;

  const bdRows=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0])).map(([amt,cnt])=>[fmt(Number(amt)),`${cnt} ${L.students}`,fmt(Number(amt)*cnt)]);
  doc.autoTable({
    startY:y, head:[[L.amount,L.count,L.subtotal]],
    body:bdRows,styles:{fontSize:9},headStyles:HEAD_STYLE,margin:{left:14,right:14},
  });

  doc.save(`classes-${MONTHS[month]}-${year}.pdf`);
}

// Whole-group homework report
function generatePerformancePDF(groups, perf, groupName, month, year, rangeKind, lang=LAST_LANG){
  const L=LABELS[lang]||LABELS.en;

  const win=rangeWindow(rangeKind,refDateFor(month,year));

  doc.setFontSize(16);doc.setFont("helvetica","bold");

      [L.missed,String(totals.missed)],

}

// One student's report (share with parents)
function generateStudentPDF(groups, perf, portfolios, pid, name, groupName, month, year, rangeKind, lang=LAST_LANG){
  const L=LABELS[lang]||LABELS.en;

  const win=rangeWindow(rangeKind,refDateFor(month,year));
  const {lessons,totals}=studentReport(groups,perf,pid,win);
  const rate=pct(totals.done,totals.partial,totals.missed);
  const p=portfolios[pid]||{};

  doc.setFontSize(16);doc.setFont("helvetica","bold");

// ── SVG charts (self-contained, offline) ──
function LineChart({primary=[],compare=null,labels=[],height=130}){
  const W=320,H=height,padL=26,padB=18,padT=8,padR=6;
  const iw=W-padL-padR, ih=H-padT-padB;
  const xAt=(i,n)=> n<=1?padL+iw/2 : padL+(iw*i/(n-1));
  const yAt=v=>padT+ih-(Math.max(0,Math.min(100,v))/100*ih);
  const toPts=arr=>arr.map((v,i)=>`${xAt(i,arr.length).toFixed(1)},${yAt(v).toFixed(1)}`).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{display:"block"}}>
      <line x1={padL} y1={padT} x2={padL} y2={padT+ih} stroke={G2}/>
      <line x1={padL} y1={padT+ih} x2={W-padR} y2={padT+ih} stroke={G2}/>
      <line x1={padL} y1={padT+ih/2} x2={W-padR} y2={padT+ih/2} stroke={G2} strokeDasharray="3 4"/>
      <text x={padL-4} y={padT+4} fontSize="9" fill={G1} textAnchor="end">100</text>
      <text x={padL-4} y={padT+ih/2+3} fontSize="9" fill={G1} textAnchor="end">50</text>
      <text x={padL-4} y={padT+ih+3} fontSize="9" fill={G1} textAnchor="end">0</text>
      {compare&&compare.length>1&&<polyline fill="none" stroke={G2} strokeWidth="2.5" strokeDasharray="4 4" points={toPts(compare)}/>}
      {primary.length>1&&<polyline fill="none" stroke={YD} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" points={toPts(primary)}/>}
      {primary.map((v,i)=><circle key={i} cx={xAt(i,primary.length)} cy={yAt(v)} r="3.3" fill={TXT}/>)}
      {labels.map((l,i)=><text key={i} x={xAt(i,labels.length)} y={H-4} fontSize="9" fill={G1} textAnchor="middle">{l}</text>)}
      {primary.length===0&&<text x={W/2} y={H/2} fontSize="11" fill={G1} textAnchor="middle">No data yet</text>}
    </svg>
  );
}
function BarRows({rows=[]}){

function Donut({segments=[],centerLabel,centerSub,size=110}){
  const r=42, C=2*Math.PI*r;
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  let offset=0;
  return(
    <svg viewBox="0 0 100 100" width={size} height={size} style={{flexShrink:0}}>
      <circle cx="50" cy="50" r={r} fill="none" stroke={BG3} strokeWidth="16"/>
      {segments.filter(s=>s.value>0).map((s,i)=>{
        const len=C*s.value/total;
        const el=<circle key={i} cx="50" cy="50" r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${len.toFixed(2)} ${(C-len).toFixed(2)}`} strokeDashoffset={(-offset).toFixed(2)} transform="rotate(-90 50 50)"/>;
        offset+=len; return el;
      })}
      {centerLabel!=null&&<text x="50" y="49" textAnchor="middle" fontSize="17" fontWeight="800" fill={TXT}>{centerLabel}</text>}
      {centerSub&&<text x="50" y="63" textAnchor="middle" fontSize="8" fill={G1}>{centerSub}</text>}
    </svg>
  );
}

  const totalPaid=group.students.reduce((s,st)=>s+st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0),0);
  const pct=totalDue>0?Math.min(100,(totalPaid/totalDue)*100):0;
  const saveSt=u=>{onUpdate({...group,students:group.students.map(s=>s.id===u.id?u:s)});setEditSt(null);};
  const removeSt=id=>onUpdate({...group,students:group.students.filter(s=>s.id!==id)});
  const addSt=()=>{if(!nm.trim())return;onUpdate({...group,students:[...group.students,makeStudent(nm.trim())]});setNm("");};

        </div>
      </div>

        <div style={{display:"flex",flexWrap:"wrap",gap:22}}>
          {[["COLLECTED",fmt(totalPaid),"#000"],["REMAINING",fmt(totalDue-totalPaid),"#5a4a00"],["STUDENTS",group.students.length,"#000"]].map(([l,v,c])=>(
            <div key={l}><div style={{color:"#00000077",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>{l}</div><div style={{color:c,fontWeight:800,fontSize:16,marginTop:2}}>{v}</div></div>

        <div style={{marginTop:16,height:6,background:"rgba(0,0,0,.15)",borderRadius:4}}>
          <div style={{height:"100%",borderRadius:4,background:"#000",width:`${pct}%`,transition:"width .4s"}}/>
        </div>
        <div style={{color:"#00000077",fontSize:11,fontWeight:700,marginTop:6,textAlign:"right"}}>{Math.round(pct)}% collected</div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {group.students.length===0&&<div style={{color:G1,textAlign:"center",padding:"44px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No students yet.<br/>Tap <b>+ Student</b> to add one.</div>}
        {group.students.map(st=>{
          const due=st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
          const paid=st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
          const full=due>0&&paid>=due;
          return(
            <div key={st.id} onClick={()=>setEditSt(st)} className="tap" style={{background:BG2,border:`1.5px solid ${full?YD:G2}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,boxShadow:SH1,cursor:"pointer"}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:full?Y:BG3,border:`2px solid ${full?YD:G2}`,display:"flex",alignItems:"center",justifyContent:"center",color:full?"#000":TXT,fontWeight:800,fontSize:17,flexShrink:0}}>
                {(st.name||"?").charAt(0).toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:TXT,fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name||"Unnamed"}</div>
                <div style={{color:full?GOOD:G1,fontSize:12.5,marginTop:3,fontWeight:600}}>{full?`✓ Fully paid (${fmt(paid)})`:`${fmt(paid)} of ${fmt(due)}`}</div>

            </div>
          );
        })}
      </div>
      <FAB onClick={()=>setAdding(true)} label="Add student">+ Student</FAB>
      {adding&&(
        <Overlay onClose={()=>{setAdding(false);setNm("");}}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>New Student</div>
          <Lbl>Full name</Lbl>

      {menuSt&&<ActionSheet title={menuSt.name||"Student"} subtitle="Choose an action" onClose={()=>setMenuSt(null)} actions={[

      {editSt&&<StudentModal student={editSt} onSave={saveSt} onClose={()=>setEditSt(null)}/>}
    </div>
  );
}

// ── Month View ──
function MonthView({monthIdx,year,groups,onBack,onSelectGroup,onUpdateGroup,onDeleteGroup,onCreateGroup,allGroups,onRequestPDF}){
  const[creating,setCreating]=useState(false);
  const[cName,setCName]=useState("");
  const[delGrp,setDelGrp]=useState(null);
  const[menuGrp,setMenuGrp]=useState(null);
  const label=`${MONTHS[monthIdx]} ${year}`;
  const mg=groups.filter(g=>g.month===monthIdx&&g.year===year);
  const totalDue=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
  const totalPaid=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
  const pct=totalDue>0?Math.min(100,(totalPaid/totalDue)*100):0;

  const create=()=>{
    if(!cName.trim())return;
    onCreateGroup({id:uid(),name:cName.trim(),month:monthIdx,year,students:[]});
    setCName("");setCreating(false);
  };

  const exportPDF=()=>onRequestPDF?onRequestPDF(monthIdx,year):generatePDF(groups,monthIdx,year,allGroups);

        </div>

      </div>
      <div style={{background:Y,borderRadius:R_CARD,padding:"20px 22px",marginBottom:22,boxShadow:SH2}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:22}}>
          <div><div style={{color:"#00000077",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>MONTH TOTAL</div><div style={{color:"#000",fontWeight:900,fontSize:22,marginTop:2,letterSpacing:"-0.5px"}}>{fmt(totalDue)}</div></div>
          <div><div style={{color:"#00000077",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>COLLECTED</div><div style={{color:"#000",fontWeight:800,fontSize:22,marginTop:2,letterSpacing:"-0.5px"}}>{fmt(totalPaid)}</div></div>
          <div><div style={{color:"#00000077",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>REMAINING</div><div style={{color:"#5a4a00",fontWeight:800,fontSize:22,marginTop:2,letterSpacing:"-0.5px"}}>{fmt(totalDue-totalPaid)}</div></div>
        </div>
        <div style={{marginTop:16,height:6,background:"rgba(0,0,0,.15)",borderRadius:4}}>
          <div style={{height:"100%",borderRadius:4,background:"#000",width:`${pct}%`,transition:"width .4s"}}/>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {mg.length===0&&<div style={{color:G1,textAlign:"center",padding:"50px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No groups yet.<br/>Tap <b>+ Group</b> to create one.</div>}
        {mg.map(g=>{
          const due=g.students.reduce((s,st)=>s+st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0),0);
          const paid=g.students.reduce((s,st)=>s+st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0),0);
          const pct=due>0?Math.min(100,(paid/due)*100):0;
          return(
            <div key={g.id} onClick={()=>onSelectGroup(g.id)} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderLeft:`5px solid ${Y}`,borderRadius:14,padding:"15px 16px 15px 18px",cursor:"pointer",boxShadow:SH1}}>

                <div style={{minWidth:0}}>
                  <div style={{color:TXT,fontWeight:800,fontSize:16,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</div>
                  <div style={{color:G1,fontSize:13,marginTop:2}}>{g.students.length} student{g.students.length!==1?"s":""} · {Math.round(pct)}% collected</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <IconBtn onClick={e=>{e.stopPropagation();setMenuGrp(g);}} label="More options" style={{fontSize:22,fontWeight:800}}>⋯</IconBtn>

          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setCreating(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={create} style={{flex:2,textAlign:"center"}}>Create Group</YBtn>
          </div>
        </Overlay>
      )}
      {menuGrp&&<ActionSheet title={menuGrp.name} subtitle={`${menuGrp.students.length} student${menuGrp.students.length!==1?"s":""}`} onClose={()=>setMenuGrp(null)} actions={[
        {icon:"📂",label:"Open group",onClick:()=>{onSelectGroup(menuGrp.id);setMenuGrp(null);}},
        {icon:"🗑",label:"Delete group",danger:true,onClick:()=>{setDelGrp(menuGrp);setMenuGrp(null);}},
      ]}/>}
      {delGrp&&<Confirm title="Delete group?" message={`"${delGrp.name}" and its ${delGrp.students.length} student${delGrp.students.length!==1?"s":""} will be permanently removed.`} onConfirm={()=>{onDeleteGroup(delGrp.id);setDelGrp(null);}} onClose={()=>setDelGrp(null)}/>}
    </div>
  );
}

// ── Payment Summary Section ──
function PaymentSummary({groups}){
  const[open,setOpen]=useState(true);
  const[expanded,setExpanded]=useState(()=>new Set());
  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res.reverse();
  },[groups]);

  const toggleMonth=(key)=>setExpanded(prev=>{
    const next=new Set(prev);
    if(next.has(key))next.delete(key);else next.add(key);
    return next;
  });

  return(
    <div style={{background:BG2,border:`1px solid ${G2}`,borderRadius:16,marginBottom:24,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{background:Y,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <span style={{color:"#000",fontWeight:800,fontSize:15}}>📊 Summary of All Months</span>
        <span style={{color:"#000",fontSize:18}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{padding:0}}>
          {activeMonths.length===0&&<div style={{color:G1,padding:"20px",textAlign:"center"}}>No data yet.</div>}
          {activeMonths.map(({month,year})=>{
            const key=`${year}-${month}`;
            const isExp=expanded.has(key);
            const mg=groups.filter(g=>g.month===month&&g.year===year);
            const allStudents=mg.flatMap(g=>g.students);
            const allPayments=allStudents.flatMap(st=>st.payments);
            const totalDue=allPayments.reduce((a,p)=>a+(Number(p.amount)||0),0);
            const totalPaid=allPayments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
            const uncollected=totalDue-totalPaid;

            // Breakdown: count each payment amount
            const breakdown={};
            allPayments.filter(p=>p.paid&&p.amount>0).forEach(p=>{
              const k=p.amount;
              breakdown[k]=(breakdown[k]||0)+1;
            });
            const bdEntries=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0]));

            return(
              <div key={key} style={{borderBottom:`1px solid ${G2}`}}>
                <div onClick={()=>toggleMonth(key)} className="tap" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",cursor:"pointer"}}>
                  <div style={{minWidth:0}}>
                    <div style={{color:TXT,fontWeight:800,fontSize:15}}>{MONTHS[month]} {year}</div>
                    <div style={{color:G1,fontSize:12,marginTop:2}}>{mg.length} groups · {allStudents.length} students</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:G1,fontSize:9.5,fontWeight:700,letterSpacing:"0.05em"}}>COLLECTED</div>
                      <div style={{color:TXT,fontWeight:800,fontSize:14}}>{fmt(totalPaid)}</div>
                    </div>
                    <span style={{color:G1,fontSize:16}}>{isExp?"▲":"▼"}</span>
                  </div>
                </div>
                {isExp&&(
                  <div style={{padding:"0 20px 18px"}}>
                    {/* Key figures */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:0,marginBottom:12,background:BG3,borderRadius:10,overflow:"hidden"}}>
                      {[["TOTAL BILLED",fmt(totalDue),TXT],["COLLECTED",fmt(totalPaid),"#000"],["UNCOLLECTED",fmt(uncollected),"#c00"],[`YOUR (${TEACHER_PCT}%)`,fmt(totalPaid*(TEACHER_PCT/100)),"#000"]].map(([l,v,c],i,arr)=>(
                        <div key={l} style={{flex:"1 1 100px",padding:"10px 14px",borderRight:i<arr.length-1?`1px solid ${G2}`:"none"}}>
                          <div style={{color:G1,fontSize:10,fontWeight:700,letterSpacing:"0.06em",marginBottom:3}}>{l}</div>
                          <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    {/* Payment breakdown */}
                    {bdEntries.length>0&&(
                      <div>
                        <div style={{color:G1,fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:8}}>PAYMENT BREAKDOWN</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {bdEntries.map(([amt,cnt])=>(
                            <div key={amt} style={{background:Y,borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
                              <span style={{color:"#000",fontWeight:700,fontSize:13}}>{fmtShort(Number(amt))}</span>
                              <span style={{color:"#00000088",fontSize:11}}>×{cnt}</span>
                              <span style={{color:"#444",fontSize:11}}>= {fmtShort(Number(amt)*cnt)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Newcomers View ──
function NewcomersView({newcomers,groups,onBack,onAdd,onUpdate,onDelete}){

  const[adding,setAdding]=useState(false);
  const[delItem,setDelItem]=useState(null);
  const[menuItem,setMenuItem]=useState(null);

  const groupNames=useMemo(()=>{
    const seen=new Set();
    groups.forEach(g=>seen.add(g.name));
    return Array.from(seen).sort();
  },[groups]);

  const sorted=useMemo(()=>newcomers.slice().sort((a,b)=>(b.arrivalDate||"").localeCompare(a.arrivalDate||"")),[newcomers]);

  const fmtDate=(s)=>{
    if(!s)return"—";
    const dt=new Date(s+"T00:00:00");
    if(isNaN(dt))return s;
    return dt.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {sorted.length===0&&<div style={{color:G1,textAlign:"center",padding:"50px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No newcomers yet.<br/>Tap <b>+ Newcomer</b> to add one.</div>}
        {sorted.map(nc=>(
          <div key={nc.id} onClick={()=>setEditItem(nc)} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:SH1,cursor:"pointer"}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:BG3,border:`2px solid ${G2}`,display:"flex",alignItems:"center",justifyContent:"center",color:TXT,fontWeight:800,fontSize:17,flexShrink:0}}>
              {(nc.name||"?").charAt(0).toUpperCase()}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:TXT,fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nc.name||"Unnamed"}</div>
              <div style={{color:G1,fontSize:12.5,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nc.groupName||"No group"} · {nc.contact||"No contact"}</div>
            </div>
            <div style={{color:G1,fontSize:11,fontWeight:700,flexShrink:0,textAlign:"right"}}>{fmtDate(nc.arrivalDate)}</div>
            <IconBtn onClick={e=>{e.stopPropagation();setMenuItem(nc);}} label="More options" style={{fontSize:22,fontWeight:800}}>⋯</IconBtn>
          </div>
        ))}
      </div>
      <FAB onClick={()=>setAdding(true)} label="Add newcomer">+ Newcomer</FAB>
      {adding&&<NewcomerModal groupNames={groupNames} onSave={n=>{onAdd(n);setAdding(false);}} onClose={()=>setAdding(false)}/>}
      {editItem&&<NewcomerModal newcomer={editItem} groupNames={groupNames} onSave={n=>{onUpdate(n);setEditItem(null);}} onClose={()=>setEditItem(null)}/>}
      {menuItem&&<ActionSheet title={menuItem.name||"Newcomer"} subtitle="Choose an action" onClose={()=>setMenuItem(null)} actions={[
        {icon:"✏️",label:"Edit newcomer",onClick:()=>{setEditItem(menuItem);setMenuItem(null);}},
        {icon:"🗑",label:"Delete newcomer",danger:true,onClick:()=>{setDelItem(menuItem);setMenuItem(null);}},
      ]}/>}
      {delItem&&<Confirm title="Delete newcomer?" message={`"${delItem.name||"This entry"}" will be permanently removed.`} onConfirm={()=>{onDelete(delItem.id);setDelItem(null);}} onClose={()=>setDelItem(null)}/>}
    </div>
  );
}

// Quick per-group homework tally for one month's group record
function groupTally(perf,g){
  let done=0,partial=0,missed=0; const gp=perf[g.id];
  if(gp)Object.values(gp.lessons||{}).forEach(ls=>Object.values(ls.records||{}).forEach(v=>{
    if(v==="done")done++;else if(v==="partial")partial++;else if(v==="missed")missed++;}));
  return {done,partial,missed,rate:pct(done,partial,missed),lessons:gp?Object.keys(gp.lessons||{}).length:0};
}

// Performance section home — groups of a month + center-wide rate
function PerformanceHome({monthIdx,year,groups,perf,activeMonths,onBack,onOpenGrid,onOpenReport,onChangeMonth}){
  const[pick,setPick]=useState(false);
  const mg=groups.filter(g=>g.month===monthIdx&&g.year===year);
  const tot=mg.reduce((t,g)=>{const q=groupTally(perf,g);return{done:t.done+q.done,partial:t.partial+q.partial,missed:t.missed+q.missed,lessons:t.lessons+q.lessons};},{done:0,partial:0,missed:0,lessons:0});
  const rate=pct(tot.done,tot.partial,tot.missed);
  return(
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1,minWidth:0}}>
          <h2 style={{margin:0,color:TXT,fontSize:21,fontWeight:800}}>Performance</h2>
          <div onClick={()=>setPick(true)} style={{color:G1,fontSize:13,fontWeight:600,cursor:"pointer"}}>{MONTHS[monthIdx]} {year} · homework <span style={{color:YD,fontWeight:800}}>change ▾</span></div>
        </div>
      </div>
      <div style={{background:Y,borderRadius:R_CARD,padding:"18px 20px",marginBottom:20,boxShadow:SH2}}>
        <div style={{color:"#00000088",fontSize:10,fontWeight:800,letterSpacing:"0.1em",marginBottom:6}}>MONTH HOMEWORK RATE</div>
        <div style={{fontSize:32,fontWeight:900,color:"#000",letterSpacing:"-1px"}}>{rate}%</div>
        <div style={{display:"flex",gap:22,marginTop:14}}>
          {[["DONE",tot.done],["PARTIAL",tot.partial],["MISSED",tot.missed]].map(([l,v])=>(
            <div key={l}><div style={{color:"#00000077",fontSize:10,fontWeight:700}}>{l}</div><div style={{fontWeight:800,fontSize:15}}>{v}</div></div>
          ))}
        </div>
      </div>
      <Lbl>Groups</Lbl>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {mg.length===0&&<div style={{color:G1,textAlign:"center",padding:"44px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No groups this month.<br/>Add them in the <b>Payments</b> section first.</div>}
        {mg.map(g=>{
          const q=groupTally(perf,g);
          const good=q.rate>=80, warn=q.rate>=60&&q.rate<80;
          return(
            <div key={g.id} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderLeft:`5px solid ${Y}`,borderRadius:14,padding:"14px 16px",boxShadow:SH1}}>
              <div onClick={()=>onOpenGrid(g.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",gap:10}}>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:16,color:TXT,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</div>
                  <div style={{color:G1,fontSize:12.5,marginTop:2}}>{g.students.length} students · {q.lessons} lessons</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:900,fontSize:20,color:TXT}}>{q.rate}%</div>
                  <div style={{fontSize:11,fontWeight:800,padding:"2px 8px",borderRadius:20,marginTop:2,background:good?"#E3F5EA":warn?"#FFF3DC":"#FDECEC",color:good?GOOD:warn?"#B8770B":BAD}}>{good?"▲ on track":warn?"— steady":"▼ needs push"}</div>
                </div>
              </div>
              <div style={{marginTop:10,height:6,background:BG3,borderRadius:4}}><div style={{height:"100%",width:`${q.rate}%`,background:Y,borderRadius:4,transition:"width .4s"}}/></div>
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <OutBtn onClick={()=>onOpenGrid(g.id)} style={{flex:1,textAlign:"center",padding:"9px 10px",minHeight:40,fontSize:13.5}}>✎ Mark homework</OutBtn>
                <OutBtn onClick={()=>onOpenReport(g.name)} style={{flex:1,textAlign:"center",padding:"9px 10px",minHeight:40,fontSize:13.5}}>📊 Report</OutBtn>
              </div>
            </div>
          );
        })}
      </div>
      {pick&&(
        <Overlay onClose={()=>setPick(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:16}}>Choose month</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {activeMonths.slice().reverse().map(({month,year})=>(
              <button key={`${year}-${month}`} onClick={()=>{onChangeMonth(month,year);setPick(false);}} style={{width:"100%",textAlign:"left",background:(month===monthIdx&&year===year)?YSOFT:BG3,border:`1px solid ${G2}`,borderRadius:12,padding:"14px 16px",fontSize:15,fontWeight:700,color:TXT,cursor:"pointer"}}>{MONTHS[month]} {year}</button>

// Homework grid — mark each student per lesson + manage lessons/homework
function HomeworkGrid({group,gp,monthIdx,year,onBack,onChange,onOpenReport,onOpenStudent}){
  const[tab,setTab]=useState("grid");
  const[editDefault,setEditDefault]=useState(false);
  const[defVal,setDefVal]=useState(gp.defaultHomework||"");
  const[addOpen,setAddOpen]=useState(false);
  const[newDate,setNewDate]=useState(iso(year,monthIdx,1));
  const[hwEdit,setHwEdit]=useState(null);   // date being edited
  const[hwVal,setHwVal]=useState("");
  const[delDate,setDelDate]=useState(null);

  const dates=Object.keys(gp.lessons||{}).sort();
  const toggle=(pid,date)=>{
    const ls=gp.lessons[date]||{records:{}};
    const cur=(ls.records||{})[pid]; const nx=nextHW(cur);
    const records={...(ls.records||{})};
    if(nx==null)delete records[pid]; else records[pid]=nx;
    onChange({...gp,lessons:{...gp.lessons,[date]:{...ls,records}}});
  };
  const addLesson=()=>{ if(!newDate||gp.lessons[newDate]){setAddOpen(false);return;} onChange({...gp,lessons:{...gp.lessons,[newDate]:{records:{}}}}); setAddOpen(false); };
  const removeLesson=(date)=>{ const l={...gp.lessons}; delete l[date]; onChange({...gp,lessons:l}); setDelDate(null); };
  const saveHw=()=>{ const ls={...(gp.lessons[hwEdit]||{records:{}})}; if(hwVal.trim())ls.homework=hwVal.trim(); else delete ls.homework; onChange({...gp,lessons:{...gp.lessons,[hwEdit]:ls}}); setHwEdit(null); };
  const stColor=s=>s==="done"?"done":s==="missed"?"miss":s==="partial"?"part":"empty";
  const cellStyle={done:{background:Y,color:"#000"},miss:{background:"#FDECEC",color:BAD,border:"1px solid #F6C9CA"},part:{background:"#FFF3DC",color:"#B8770B",border:"1px solid #F3D9A6"},empty:{background:BG3,color:G2,border:`1px solid ${G2}`}};
  const glyph={done:"✓",miss:"✗",part:"◐",empty:""};

  return(
    <div style={{paddingBottom:90}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:G1,fontSize:12,fontWeight:600}}>{MONTHS[monthIdx]} {year} · Performance</div>
          <div style={{color:TXT,fontWeight:800,fontSize:19,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{group.name}</div>
        </div>
        <button onClick={()=>onOpenReport(group.name)} aria-label="Report" style={{background:"#111",border:"none",borderRadius:12,color:"#fff",height:44,padding:"0 14px",cursor:"pointer",fontSize:14,fontWeight:700}}>📊</button>
      </div>

      {/* month default homework */}
      <div style={{background:YSOFT,border:`1.5px solid ${YD}`,borderRadius:14,padding:"13px 15px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:G1,fontSize:11,fontWeight:800,letterSpacing:"0.08em",textTransform:"uppercase"}}>Month default homework</div>
          <button onClick={()=>{setDefVal(gp.defaultHomework||"");setEditDefault(true);}} style={{background:"none",border:"none",color:YD,fontWeight:800,fontSize:12.5,cursor:"pointer"}}>Edit ✎</button>
        </div>
        <div style={{fontSize:13.5,color:"#5a4a00",marginTop:6,lineHeight:1.45}}>{gp.defaultHomework||<span style={{color:"#8a7400",fontStyle:"italic"}}>Not set — tap Edit to add homework for the whole month.</span>}</div>
        <div style={{fontSize:11,color:"#8a7400",marginTop:6}}>Applies to every lesson unless a date is customised.</div>
      </div>

      <Segmented value={tab} onChange={setTab} options={[{key:"grid",label:"Grid view"},{key:"lessons",label:"Lessons & homework"}]}/>

      {tab==="grid"&&(
        <div style={{marginTop:14}}>
          {dates.length===0?(
            <div style={{color:G1,textAlign:"center",padding:"40px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No lessons yet.<br/>Tap <b>+ Lesson</b> to add class dates.</div>
          ):(
          <div style={{overflowX:"auto",border:`1px solid ${G2}`,borderRadius:14,background:BG2,boxShadow:SH1}}>
            <table style={{borderCollapse:"collapse",width:"100%"}}>
              <thead>
                <tr style={{background:BG3}}>
                  <th style={{textAlign:"left",padding:"10px 12px",fontSize:11,color:G1,position:"sticky",left:0,background:BG3,zIndex:1}}>Student</th>
                  {dates.map(d=>(<th key={d} style={{padding:"8px 6px",fontSize:10.5,color:G1,whiteSpace:"nowrap"}}>{shortDate(d)}{gp.lessons[d].homework?<span style={{color:"#B8770B"}}>*</span>:""}</th>))}
                  <th style={{padding:"8px 8px",fontSize:11,color:G1}}>%</th>
                </tr>
              </thead>
              <tbody>
                {group.students.map((st,ri)=>{
                  const pid=st.pid||st.id;
                  let d=0,p=0,m=0;
                  dates.forEach(dt=>{const v=(gp.lessons[dt].records||{})[pid]; if(v==="done")d++;else if(v==="partial")p++;else if(v==="missed")m++;});
                  const rp=pct(d,p,m);
                  const bg=ri%2?"#FAFAFB":"#fff";
                  return(
                    <tr key={pid} style={{borderTop:`1px solid ${G2}`,background:bg}}>
                      <td onClick={()=>onOpenStudent(pid)} style={{padding:"9px 12px",fontSize:13,fontWeight:600,whiteSpace:"nowrap",position:"sticky",left:0,background:bg,cursor:"pointer",color:TXT}}>{st.name||"Unnamed"}</td>
                      {dates.map(dt=>{const s=stColor((gp.lessons[dt].records||{})[pid]);return(
                        <td key={dt} style={{padding:"5px 6px",textAlign:"center"}}>
                          <button onClick={()=>toggle(pid,dt)} style={{width:28,height:28,borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",...cellStyle[s]}}>{glyph[s]}</button>
                        </td>);})}
                      <td style={{padding:"5px 8px",textAlign:"center",fontWeight:800,fontSize:12,color:rp>=80?GOOD:rp>=60?"#B8770B":BAD}}>{dates.length?rp:"—"}</td>
                    </tr>
                  );
                })}
                {group.students.length===0&&<tr><td colSpan={dates.length+2} style={{padding:"24px",textAlign:"center",color:G1}}>No students. Add them in Payments.</td></tr>}
              </tbody>
            </table>
          </div>)}
          <div style={{display:"flex",gap:12,marginTop:12,fontSize:11.5,color:G1,alignItems:"center",flexWrap:"wrap"}}>
            <span><span style={{display:"inline-flex",width:18,height:18,borderRadius:5,background:Y,color:"#000",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,verticalAlign:"middle"}}>✓</span> Done</span>
            <span><span style={{display:"inline-flex",width:18,height:18,borderRadius:5,background:"#FDECEC",color:BAD,alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,verticalAlign:"middle"}}>✗</span> Missed</span>
            <span><span style={{display:"inline-flex",width:18,height:18,borderRadius:5,background:"#FFF3DC",color:"#B8770B",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,verticalAlign:"middle"}}>◐</span> Partial</span>
            <span style={{marginLeft:"auto",color:"#B8770B",fontWeight:700}}>* custom homework</span>
          </div>
        </div>
      )}

      {tab==="lessons"&&(
        <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:10}}>
          {dates.length===0&&<div style={{color:G1,textAlign:"center",padding:"30px 0"}}>No lessons yet. Tap <b>+ Lesson</b> below.</div>}
          {dates.map(d=>{
            const ls=gp.lessons[d]; const custom=!!ls.homework;
            return(
              <div key={d} style={{background:BG2,border:`1.5px solid ${custom?YD:G2}`,borderRadius:14,padding:"13px 15px",boxShadow:SH1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:800,fontSize:15,color:TXT}}>{shortDate(d)} {custom&&<span style={{color:"#B8770B",fontSize:12}}>· custom *</span>}</div>
                  <IconBtn onClick={()=>setDelDate(d)} label="Remove lesson" danger>✕</IconBtn>
                </div>
                <div style={{fontSize:13.5,color:custom?TXT:G1,marginTop:6,lineHeight:1.4}}>{ls.homework||gp.defaultHomework||"— no homework set —"}</div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <OutBtn onClick={()=>{setHwEdit(d);setHwVal(ls.homework||"");}} style={{flex:1,textAlign:"center",padding:"8px 10px",minHeight:38,fontSize:13}}>{custom?"Edit homework":"Customise homework"}</OutBtn>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <FAB onClick={()=>setAddOpen(true)} label="Add lesson">+ Lesson</FAB>

      {editDefault&&(
        <Overlay onClose={()=>setEditDefault(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:4}}>Month default homework</div>
          <div style={{color:G1,fontSize:13,marginBottom:16}}>Shown for every lesson unless a date is customised.</div>
          <textarea value={defVal} onChange={e=>setDefVal(e.target.value)} rows={3} placeholder="e.g. Workbook p.40–41 + 10 new words" style={{width:"100%",background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",resize:"vertical",marginBottom:20}}/>
          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setEditDefault(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={()=>{onChange({...gp,defaultHomework:defVal.trim()});setEditDefault(false);}} style={{flex:2,textAlign:"center"}}>Save</YBtn>
          </div>
        </Overlay>
      )}
      {hwEdit&&(
        <Overlay onClose={()=>setHwEdit(null)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:4}}>Homework · {shortDate(hwEdit)}</div>
          <div style={{color:G1,fontSize:13,marginBottom:16}}>Leave empty to use the month default.</div>
          <textarea value={hwVal} onChange={e=>setHwVal(e.target.value)} rows={3} placeholder={gp.defaultHomework||"Homework for this lesson"} style={{width:"100%",background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",resize:"vertical",marginBottom:20}}/>
          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setHwEdit(null)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={saveHw} style={{flex:2,textAlign:"center"}}>Save</YBtn>
          </div>
        </Overlay>
      )}
      {addOpen&&(
        <Overlay onClose={()=>setAddOpen(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:16}}>Add lesson date</div>
          <Lbl>Date</Lbl>
          <Inp type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{marginBottom:20}}/>
          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setAddOpen(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={addLesson} style={{flex:2,textAlign:"center"}}>Add Lesson</YBtn>
          </div>
        </Overlay>
      )}
      {delDate&&<Confirm title="Remove lesson?" message={`${shortDate(delDate)} and its homework marks will be removed.`} confirmLabel="Remove" onConfirm={()=>removeLesson(delDate)} onClose={()=>setDelDate(null)}/>}
    </div>
  );
}

// Group report — charts + table over a chosen range
function GroupReport({groupName,monthIdx,year,groups,perf,onBack,onExport}){
  const[range,setRange]=useState("month");
  const win=rangeWindow(range,refDateFor(monthIdx,year));
  const {lessons,perStudent,totals}=useMemo(()=>groupReport(groups,perf,groupName,win),[groups,perf,groupName,range,monthIdx,year]);
  const rate=pct(totals.done,totals.partial,totals.missed);
  const line=lessons.map(l=>pct(l.done,l.partial,l.missed));
  const lbls=lessons.map(l=>shortDate(l.date));
  const bars=perStudent.map(s=>({label:s.name,value:pct(s.done,s.partial,s.missed)})).sort((a,b)=>b.value-a.value);
  const rows=perStudent.slice().sort((a,b)=>a.name.localeCompare(b.name));

  return(
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:G1,fontSize:12,fontWeight:600}}>{groupName} · report</div>
          <h2 style={{margin:0,color:TXT,fontSize:19,fontWeight:800}}>Group Report</h2>
        </div>
        <button onClick={()=>onExport(range)} aria-label="Export PDF" style={{background:"#111",border:"none",borderRadius:12,color:"#fff",height:44,padding:"0 14px",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>📄 PDF</button>
      </div>
      <div style={{marginBottom:16}}><Segmented value={range} onChange={setRange} options={[{key:"week",label:"Week"},{key:"month",label:"Month"},{key:"3mo",label:"3 mo"},{key:"6mo",label:"6 mo"}]}/></div>

      <div style={{display:"flex",background:BG3,borderRadius:12,overflow:"hidden",marginBottom:16}}>
        {[["RATE",`${rate}%`,TXT],["DONE",totals.done,GOOD],["PARTIAL",totals.partial,"#B8770B"],["MISSED",totals.missed,BAD]].map(([l,v,c],i,a)=>(
          <div key={l} style={{flex:1,padding:"11px 10px",borderRight:i<a.length-1?`1px solid ${G2}`:"none"}}><div style={{color:G1,fontSize:9.5,fontWeight:800}}>{l}</div><div style={{fontWeight:800,fontSize:16,color:c}}>{v}</div></div>
        ))}
      </div>

      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:"14px 14px 10px",marginBottom:14,boxShadow:SH1}}>
        <Lbl>Completion trend · line</Lbl>
        <LineChart primary={line} labels={lbls.length<=8?lbls:[]}/>
      </div>
      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:14,marginBottom:14,boxShadow:SH1}}>
        <Lbl>Per-student rate · bar</Lbl>
        <BarRows rows={bars}/>
      </div>
      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:14,marginBottom:14,boxShadow:SH1}}>
        <Lbl>Overall split · pie</Lbl>
        <div style={{display:"flex",alignItems:"center",gap:18}}>
          <Donut segments={[{value:totals.done,color:Y},{value:totals.partial,color:PART},{value:totals.missed,color:BAD}]} centerLabel={`${rate}%`} centerSub="done"/>
          <div style={{flex:1,fontSize:13}}>
            {[["Done",totals.done,Y],["Partial",totals.partial,PART],["Missed",totals.missed,BAD]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:12,height:12,borderRadius:3,background:c}}/>{l}<b style={{marginLeft:"auto"}}>{v}</b></div>
            ))}
          </div>
        </div>
      </div>
      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,overflow:"hidden",boxShadow:SH1}}>
        <div style={{padding:"12px 14px 4px"}}><Lbl>Per-student · table</Lbl></div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
            <thead><tr style={{background:BG3}}>{["Student","Done","Part.","Miss","Rate"].map((h,i)=><th key={h} style={{padding:"9px 12px",fontSize:11,color:G1,textAlign:i?"center":"left"}}>{h}</th>)}</tr></thead>
            <tbody>
              {rows.length===0&&<tr><td colSpan={5} style={{padding:"20px",textAlign:"center",color:G1}}>No homework marked in this range.</td></tr>}
              {rows.map((s,i)=>{const rp=pct(s.done,s.partial,s.missed);return(
                <tr key={s.pid} style={{borderTop:`1px solid ${G2}`,background:i%2?"#FAFAFB":"#fff"}}>
                  <td style={{padding:"9px 12px",fontWeight:600}}>{s.name}</td>
                  <td style={{padding:"9px 12px",textAlign:"center"}}>{s.done}</td>
                  <td style={{padding:"9px 12px",textAlign:"center"}}>{s.partial}</td>
                  <td style={{padding:"9px 12px",textAlign:"center"}}>{s.missed}</td>
                  <td style={{padding:"9px 12px",textAlign:"center",fontWeight:800,color:rp>=80?GOOD:rp>=60?"#B8770B":BAD}}>{rp}%</td>
                </tr>);})}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// Rate for one person over a window (used in lists/cards)
function personRate(groups,perf,pid,win){ const {totals}=studentReport(groups,perf,pid,win); return {rate:pct(totals.done,totals.partial,totals.missed),...totals}; }

function PortfolioEditModal({name,data,onSave,onClose}){
  const[d,setD]=useState({gradeYear:"",studyPlace:"",livingPlace:"",studentPhone:"",parentPhone:"",notes:"",...data});
  const upd=(f,v)=>setD(x=>({...x,[f]:v}));
  const F=[["gradeYear","Course / grade year","e.g. 2nd year (university)"],["studyPlace","Place of study","e.g. TUIT / School 12"],["livingPlace","Lives in","e.g. Chilonzor, Tashkent"],["studentPhone","Student phone","+998 ..."],["parentPhone","Parent phone","+998 ..."]];
  return(
    <Overlay onClose={onClose}>
      <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>{name} · info</div>
      {F.map(([k,l,ph])=>(<div key={k}><Lbl>{l}</Lbl><Inp value={d[k]} onChange={e=>upd(k,e.target.value)} placeholder={ph} style={{marginBottom:16}}/></div>))}
      <Lbl>Notes</Lbl>
      <textarea value={d.notes} onChange={e=>upd("notes",e.target.value)} rows={2} placeholder="Anything to remember" style={{width:"100%",background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",resize:"vertical",marginBottom:22}}/>
      <div style={{display:"flex",gap:10}}>
        <OutBtn onClick={onClose} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
        <YBtn onClick={()=>onSave(d)} style={{flex:2,textAlign:"center"}}>Save Info</YBtn>
      </div>
    </Overlay>
  );
}

// Portfolio list — every unique student (deduped by pid)
function PortfolioList({groups,perf,portfolios,onBack,onOpenStudent}){
  const[q,setQ]=useState("");
  const people=useMemo(()=>Object.values(rosterByPid(groups)).sort((a,b)=>a.name.localeCompare(b.name)),[groups]);
  const rates=useMemo(()=>{ const m={}; people.forEach(p=>{ m[p.pid]=personRate(groups,perf,p.pid,rangeWindow("6mo",refDateFor(p.month,p.year))).rate; }); return m; },[people,perf,groups]);
  const shown=people.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||(p.groupName||"").toLowerCase().includes(q.toLowerCase()));
  return(
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1,minWidth:0}}>
          <h2 style={{margin:0,color:TXT,fontSize:21,fontWeight:800}}>Student Portfolio</h2>
          <div style={{color:G1,fontSize:13}}>{people.length} student{people.length!==1?"s":""}</div>
        </div>
      </div>
      <Inp placeholder="🔍 Search name or group" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:16}}/>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {shown.length===0&&<div style={{color:G1,textAlign:"center",padding:"44px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No students found.</div>}
        {shown.map(p=>{
          const r=rates[p.pid]||0; const has=(portfolios[p.pid]&&Object.values(portfolios[p.pid]).some(v=>v&&String(v).trim()));
          return(
            <div key={p.pid} onClick={()=>onOpenStudent(p.pid)} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,boxShadow:SH1,cursor:"pointer"}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:BG3,border:`2px solid ${G2}`,display:"flex",alignItems:"center",justifyContent:"center",color:TXT,fontWeight:800,fontSize:17,flexShrink:0}}>{(p.name||"?").charAt(0).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:TXT,fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name||"Unnamed"}</div>
                <div style={{color:G1,fontSize:12.5,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.groupName} {has?"":"· no info yet"}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:15,color:r>=80?GOOD:r>=60?"#B8770B":r>0?BAD:G1}}>{r}%</div>
                <div style={{color:G1,fontSize:10,fontWeight:700}}>HW</div>
              </div>
              <div style={{color:G1,fontSize:20,flexShrink:0}}>›</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Portfolio detail — identity + info + recent homework

        </div>

      <Lbl>Personal information</Lbl>

        {F.map(([k,l],i)=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",gap:12,padding:"12px 0",borderBottom:i<F.length-1||info.notes?`1px solid ${G2}`:"none"}}>
