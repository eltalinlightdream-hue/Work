// ── PDF Generator ──
function generatePDF(groups, month, year, allMonths){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const title=`My Classes — ${MONTHS[month]} ${year}`;
  doc.setFontSize(16);doc.setFont("helvetica","bold");
  doc.text(title,14,16);
  doc.setFontSize(9);doc.setFont("helvetica","normal");
  doc.text(`Generated: ${new Date().toLocaleDateString()}`,14,22);

  const monthGroups=groups.filter(g=>g.month===month&&g.year===year);
  let y=30;

  monthGroups.forEach(g=>{
    const totalDue=g.students.reduce((s,st)=>s+st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0),0);
    const totalPaid=g.students.reduce((s,st)=>s+st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0),0);

    if(y>250){doc.addPage();y=20;}
    doc.setFont("helvetica","bold");doc.setFontSize(12);
    doc.text(g.name,14,y);
    doc.setFont("helvetica","normal");doc.setFontSize(9);
    doc.text(`Total: ${fmt(totalDue)}  |  Collected: ${fmt(totalPaid)}  |  Remaining: ${fmt(totalDue-totalPaid)}`,14,y+6);
    y+=12;

    const rows=g.students.map(st=>{
      const due=st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
      const paid=st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
      const breakdown=st.payments.map(p=>`${p.label}: ${fmt(p.amount)} (${p.paid?"✓":"✗"})`).join(" | ");
      return[st.name, fmt(due), fmt(paid), fmt(due-paid), paid>=due&&due>0?"PAID":"UNPAID"];
    });

    doc.autoTable({
      startY:y, head:[["Student","Total Due","Paid","Remaining","Status"]],
      body:rows,
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
      alternateRowStyles:{fillColor:[245,245,245]},
      columnStyles:{4:{halign:"center"}},
      margin:{left:14,right:14},
    });
    y=doc.lastAutoTable.finalY+10;
  });

  // Summary page
  doc.addPage();
  doc.setFont("helvetica","bold");doc.setFontSize(14);
  doc.text(`Payment Summary — ${MONTHS[month]} ${year}`,14,20);
  y=30;

  const allPaid=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
  const allDue=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);

  // Payment amount breakdown
  const breakdown={};
  monthGroups.forEach(g=>g.students.forEach(st=>st.payments.filter(p=>p.paid&&p.amount>0).forEach(p=>{
    const k=p.amount;
    breakdown[k]=(breakdown[k]||0)+1;
  })));

  doc.autoTable({
    startY:y,
    head:[["Metric","Value"]],
    body:[
      ["Total Billed",fmt(allDue)],
      ["Total Collected",fmt(allPaid)],
      ["Uncollected",fmt(allDue-allPaid)],
      [`Your Income (${TEACHER_PCT}%)`,fmt(allPaid*(TEACHER_PCT/100))],
      [`Center Share (${100-TEACHER_PCT}%)`,fmt(allPaid*((100-TEACHER_PCT)/100))],
    ],
    styles:{fontSize:10},
    headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
    margin:{left:14,right:14},
  });
  y=doc.lastAutoTable.finalY+10;

  doc.setFont("helvetica","bold");doc.setFontSize(11);
  doc.text("Payment Amount Breakdown",14,y);y+=8;

  const bdRows=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0])).map(([amt,cnt])=>[fmt(Number(amt)),`${cnt} student${cnt!==1?"s":""}`,fmt(Number(amt)*cnt)]);
  doc.autoTable({
    startY:y, head:[["Amount","Count","Subtotal"]],
    body:bdRows,
    styles:{fontSize:9},
    headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
    margin:{left:14,right:14},
  });

  doc.save(`classes-${MONTHS[month]}-${year}.pdf`);
}

const Inp=({style={}, ...p})=>(
  <input style={{background:BG3,border:`1.5px solid transparent`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",width:"100%",WebkitAppearance:"none",...style}}
    onFocus={e=>{e.target.style.borderColor=YD;e.target.style.background=BG2;}}
    onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background=style.background||BG3;}}
    {...p}/>
);
const YBtn=({onClick,style={},children})=>(
  <button onClick={onClick} style={{background:Y,border:"none",borderRadius:R_BTN,color:"#000",padding:"13px 20px",cursor:"pointer",fontSize:15,fontWeight:800,minHeight:48,boxShadow:SH1,...style}}>{children}</button>
);
const OutBtn=({onClick,style={},children})=>(
  <button onClick={onClick} style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 18px",cursor:"pointer",fontSize:15,fontWeight:600,minHeight:48,...style}}>{children}</button>
);
const BackBtn=({onClick})=>(
  <button onClick={onClick} aria-label="Back" style={{background:BG2,border:`1.5px solid ${G2}`,color:TXT,borderRadius:"50%",width:44,height:44,minWidth:44,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:SH1,flexShrink:0}}>←</button>
);
const Lbl=({children})=><div style={{color:G1,fontSize:11,fontWeight:800,letterSpacing:"0.08em",marginBottom:8,textTransform:"uppercase"}}>{children}</div>;
// Icon button with a guaranteed 44px hit area
const IconBtn=({onClick,label,danger,children,style={}})=>(
  <button onClick={onClick} aria-label={label} style={{
    width:44,height:44,minWidth:44,borderRadius:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,
    background:danger?"#FDECEC":BG3,border:`1px solid ${danger?"#F6C9CA":G2}`,color:danger?BAD:TXT,...style}}>{children}</button>
);
// Floating action button — thumb-reachable primary action
const FAB=({onClick,label,children})=>(
  <button onClick={onClick} aria-label={label} style={{
    position:"fixed",right:"max(18px,var(--safe-right))",bottom:"calc(20px + var(--safe-bottom))",zIndex:900,
    height:56,minWidth:56,borderRadius:28,border:"none",cursor:"pointer",background:Y,color:"#000",fontWeight:800,fontSize:16,
    display:"flex",alignItems:"center",gap:8,padding:"0 22px",boxShadow:SHFAB}}>{children}</button>
);
const Overlay=({onClose,children,pad=24})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(17,17,20,.55)",backdropFilter:"blur(2px)",WebkitBackdropFilter:"blur(2px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,animation:"fadeIn .15s ease"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:BG2,borderRadius:"22px 22px 0 0",padding:pad,paddingBottom:`calc(${pad}px + var(--safe-bottom))`,width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)",animation:"sheetUp .22s cubic-bezier(.2,.9,.3,1)"}}>
      <div style={{width:38,height:4,background:G2,borderRadius:4,margin:"0 auto 18px"}}/>
      {children}
    </div>
  </div>
);
// Reusable confirm dialog — prevents accidental destructive taps
function Confirm({title,message,confirmLabel="Delete",onConfirm,onClose}){
  return(
    <Overlay onClose={onClose}>
      <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:8}}>{title}</div>
      <div style={{color:G1,fontSize:14,lineHeight:1.5,marginBottom:24}}>{message}</div>
      <div style={{display:"flex",gap:10}}>
        <OutBtn onClick={onClose} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
        <button onClick={onConfirm} style={{flex:1,background:BAD,color:"#fff",border:"none",borderRadius:R_BTN,padding:"13px 18px",fontWeight:800,fontSize:15,minHeight:48,cursor:"pointer"}}>{confirmLabel}</button>
      </div>
    </Overlay>
  );
}

// ── Student Modal (no personal info) ──
function StudentModal({student,onSave,onClose}){
  const[d,setD]=useState({...student,payments:student.payments.map(p=>({...p}))});
  const updP=(i,f,v)=>setD(x=>({...x,payments:x.payments.map((p,j)=>j===i?{...p,[f]:v}:p)}));
  const addP=()=>setD(x=>({...x,payments:[...x.payments,{id:uid(),label:"Additional payment",amount:0,paid:false}]}));
  const delP=i=>setD(x=>({...x,payments:x.payments.filter((_,j)=>j!==i)}));
  const totalDue=d.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
  const totalPaid=d.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
  const pct=totalDue>0?Math.min(100,Math.round((totalPaid/totalDue)*100)):0;
  return(
    <Overlay onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span style={{color:TXT,fontWeight:800,fontSize:20}}>{d.name||"Student"}</span>
        <IconBtn onClick={onClose} label="Close">✕</IconBtn>
      </div>
      {/* Paid / due summary */}
      <div style={{background:"#111",borderRadius:14,padding:"14px 16px",marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
          <span style={{color:"#fff",fontWeight:800,fontSize:18}}>{fmt(totalPaid)}</span>
          <span style={{color:"#ffffff99",fontSize:13}}>of {fmt(totalDue)}</span>
        </div>
        <div style={{height:6,background:"rgba(255,255,255,.15)",borderRadius:4}}>
          <div style={{height:"100%",borderRadius:4,background:Y,width:`${pct}%`,transition:"width .4s"}}/>
        </div>
      </div>
      <Lbl>Student Name</Lbl>
      <Inp value={d.name} onChange={e=>setD(x=>({...x,name:e.target.value}))} placeholder="Student name" style={{marginBottom:22}}/>
      <Lbl>Payment Records</Lbl>
      {d.payments.map((p,i)=>(
        <div key={p.id} style={{background:p.paid?YSOFT:BG3,borderRadius:14,padding:14,marginBottom:10,border:p.paid?`1.5px solid ${YD}`:`1.5px solid transparent`}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <Inp value={p.label} onChange={e=>updP(i,"label",e.target.value)} placeholder="Payment label" style={{background:BG2}}/>
            {i>0&&<IconBtn onClick={()=>delP(i)} label="Remove payment" danger>✕</IconBtn>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>

// ── Payment Summary Section ──
function PaymentSummary({groups}){
  const[open,setOpen]=useState(true);
  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res;
  },[groups]);

  return(
    <div style={{background:BG2,border:`1px solid ${G2}`,borderRadius:16,marginBottom:24,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{background:Y,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <span style={{color:"#000",fontWeight:800,fontSize:15}}>📊 Payment Summary by Month</span>
        <span style={{color:"#000",fontSize:18}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{padding:0}}>
          {activeMonths.length===0&&<div style={{color:G1,padding:"20px",textAlign:"center"}}>No data yet.</div>}
          {activeMonths.map(({month,year})=>{
            const mg=groups.filter(g=>g.month===month&&g.year===year);
            const allStudents=mg.flatMap(g=>g.students);
            const allPayments=allStudents.flatMap(st=>st.payments);
            const totalDue=allPayments.reduce((a,p)=>a+(Number(p.amount)||0),0);
            const totalPaid=allPayments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
            const uncollected=totalDue-totalPaid;

            // Breakdown: count each payment amount
            const breakdown={};
            allPayments.filter(p=>p.paid&&p.amount>0).forEach(p=>{
              const k=p.amount;
              breakdown[k]=(breakdown[k]||0)+1;
            });
            const bdEntries=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0]));

            return(
              <div key={`${year}-${month}`} style={{borderBottom:`1px solid ${G2}`,padding:"16px 20px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <span style={{color:TXT,fontWeight:800,fontSize:15}}>{MONTHS[month]} {year}</span>
                  <span style={{color:G1,fontSize:12}}>{mg.length} groups · {allStudents.length} students</span>
                </div>
                {/* Key figures */}
                <div style={{display:"flex",flexWrap:"wrap",gap:0,marginBottom:12,background:BG3,borderRadius:10,overflow:"hidden"}}>
                  {[["TOTAL BILLED",fmt(totalDue),TXT],["COLLECTED",fmt(totalPaid),"#000"],["UNCOLLECTED",fmt(uncollected),"#c00"],[`YOUR (${TEACHER_PCT}%)`,fmt(totalPaid*(TEACHER_PCT/100)),"#000"]].map(([l,v,c],i,arr)=>(
                    <div key={l} style={{flex:"1 1 100px",padding:"10px 14px",borderRight:i<arr.length-1?`1px solid ${G2}`:"none"}}>
                      <div style={{color:G1,fontSize:10,fontWeight:700,letterSpacing:"0.06em",marginBottom:3}}>{l}</div>
                      <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
                    </div>
                  ))}
                </div>
                {/* Payment breakdown */}
                {bdEntries.length>0&&(
                  <div>
                    <div style={{color:G1,fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:8}}>PAYMENT BREAKDOWN</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {bdEntries.map(([amt,cnt])=>(
                        <div key={amt} style={{background:Y,borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
                          <span style={{color:"#000",fontWeight:700,fontSize:13}}>{fmtShort(Number(amt))}</span>
                          <span style={{color:"#00000088",fontSize:11}}>×{cnt}</span>
                          <span style={{color:"#444",fontSize:11}}>= {fmtShort(Number(amt)*cnt)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App(){
  const[groups,setGroups]=useState(()=>{ const d=window._loadData(); return d||MARCH_DATA; });
  const[view,setView]=useState("home");
  const[selMonth,setSelMonth]=useState(null);
  const[selGroup,setSelGroup]=useState(null);
  const[addingMonth,setAddingMonth]=useState(false);
  const[newMonthIdx,setNewMonthIdx]=useState(NOW_MONTH);
  const[copyFromMonth,setCopyFromMonth]=useState("");
  const[saved,setSaved]=useState(false);
  const[restoreMsg,setRestoreMsg]=useState("");
  const[menuOpen,setMenuOpen]=useState(false);

  // Auto-save
  useEffect(()=>{
    window._saveData(groups);
    setSaved(true);
    const t=setTimeout(()=>setSaved(false),1200);
    return()=>clearTimeout(t);
  },[groups]);

  // Auto PDF on 5th of month
  useEffect(()=>{
    const today=new Date();
    if(today.getDate()===5){
      const key=`autoPDF_${today.getFullYear()}_${today.getMonth()}`;
      if(!localStorage.getItem(key)){
        const prevMonth=today.getMonth()===0?11:today.getMonth()-1;
        const prevYear=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
        const hasData=groups.some(g=>g.month===prevMonth&&g.year===prevYear);
        if(hasData){
          setTimeout(()=>{
            generatePDF(groups,prevMonth,prevYear,groups);
            localStorage.setItem(key,"done");
          },2000);
        }
      }
    }
  },[]);

  const updGroup=useCallback(g=>setGroups(p=>p.map(x=>x.id===g.id?g:x)),[]);
  const addGroup=useCallback(g=>setGroups(p=>[...p,g]),[]);
  const delGroup=useCallback(id=>setGroups(p=>p.filter(x=>x.id!==id)),[]);

  // Copy students from one month to a new month
  const openMonth=(targetMonth,targetYear,copyKey)=>{
    if(copyKey){
      const[cm,cy]=copyKey.split("-").map(Number);
      const srcGroups=groups.filter(g=>g.month===cm&&g.year===cy);
      srcGroups.forEach(g=>{
        const already=groups.some(x=>x.month===targetMonth&&x.year===targetYear&&x.name===g.name);
        if(!already){
          const newGroup={
            ...g,
            id:uid(),
            month:targetMonth,
            year:targetYear,
            students:g.students.map(st=>({
              ...st,
              id:uid(),
              payments:st.payments.map(p=>({...p,id:uid(),paid:false}))
            }))
          };
          addGroup(newGroup);
        }
      });
    }
    setSelMonth(targetMonth);
    setView("month");
    setAddingMonth(false);
  };

  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res;
  },[groups]);

  const monthStats=(month,year)=>{
    const mg=groups.filter(g=>g.month===month&&g.year===year);
    const due=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    const paid=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    return{due,paid,groups:mg.length,students:mg.reduce((s,g)=>s+g.students.length,0)};
  };

  const doBackup=()=>{
    const blob=new Blob([JSON.stringify(groups,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();
    a.href=url;
    a.download=`myclasses-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doRestore=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!Array.isArray(parsed))throw new Error();
        setGroups(parsed);
        setRestoreMsg("✓ Restored!");
        setTimeout(()=>setRestoreMsg(""),3000);
      }catch{
        setRestoreMsg("✗ Invalid file");
        setTimeout(()=>setRestoreMsg(""),3000);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // ── Routing ──
  if(view==="group"&&selGroup){
    const grp=groups.find(g=>g.id===selGroup);
    if(!grp){setView("month");return null;}
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"24px 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <GroupView group={grp} monthLabel={`${MONTHS[grp.month]} ${grp.year}`}
            onBack={()=>setView("month")} onUpdate={g=>{updGroup(g);}}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}
      </div>
    );
  }

  if(view==="month"&&selMonth!==null){
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"24px 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <MonthView monthIdx={selMonth} year={NOW_YEAR} groups={groups}
            onBack={()=>setView("home")}
            onSelectGroup={id=>{setSelGroup(id);setView("group");}}
            onUpdateGroup={updGroup} onDeleteGroup={delGroup} onCreateGroup={addGroup}
            allGroups={groups}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}
      </div>
    );
  }

  // ── Home ──
  const latest=activeMonths.length?activeMonths[activeMonths.length-1]:{month:NOW_MONTH,year:NOW_YEAR};
  const hero=monthStats(latest.month,latest.year);
  const heroIncome=hero.paid*(TEACHER_PCT/100);
  const heroPct=hero.due>0?Math.min(100,Math.round((hero.paid/hero.due)*100)):0;
  return(
    <div style={{minHeight:"100vh",background:BG,padding:"calc(20px + var(--safe-top)) 16px 40px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:22}}>
          <div style={{background:Y,borderRadius:14,width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,boxShadow:SH1,flexShrink:0}}>🎓</div>
          <div style={{flex:1,minWidth:0}}>
            <h1 style={{margin:0,color:TXT,fontSize:24,fontWeight:900,letterSpacing:"-0.5px"}}>My Classes</h1>
            <p style={{margin:"3px 0 0",color:G1,fontSize:13}}>Educational Center</p>
          </div>
          <IconBtn onClick={()=>setMenuOpen(true)} label="Menu & backup" style={{background:BG2,boxShadow:SH1,fontSize:22,fontWeight:800}}>⋯</IconBtn>
        </div>

        {/* Hero — headline income for the most recent month */}
        <div style={{background:"#111",borderRadius:20,padding:"22px 24px",marginBottom:26,boxShadow:SH2,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-44,right:-34,width:150,height:150,borderRadius:"50%",background:"rgba(255,214,0,.13)"}}/>
          <div style={{position:"relative"}}>
            <div style={{color:"#ffffff99",fontSize:11,fontWeight:800,letterSpacing:"0.1em",marginBottom:8}}>YOUR INCOME · {MONTHS[latest.month].toUpperCase()} {latest.year}</div>
            <div style={{color:Y,fontSize:33,fontWeight:900,letterSpacing:"-1px",marginBottom:4}}>{fmt(heroIncome)}</div>
            <div style={{color:"#ffffff88",fontSize:12,marginBottom:18}}>{TEACHER_PCT}% of collected payments</div>
            <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
              {[["BILLED",fmt(hero.due)],["COLLECTED",fmt(hero.paid)],[`CENTER (${100-TEACHER_PCT}%)`,fmt(hero.paid*((100-TEACHER_PCT)/100))]].map(([l,v])=>(
                <div key={l}><div style={{color:"#ffffff77",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>{l}</div><div style={{color:"#fff",fontWeight:800,fontSize:15,marginTop:3}}>{v}</div></div>
              ))}
            </div>
            <div style={{marginTop:16,height:6,background:"rgba(255,255,255,.15)",borderRadius:4}}>
              <div style={{height:"100%",borderRadius:4,background:Y,width:`${heroPct}%`,transition:"width .4s"}}/>
            </div>
            <div style={{color:"#ffffff77",fontSize:11,fontWeight:700,marginTop:6,textAlign:"right"}}>{heroPct}% collected</div>
          </div>
        </div>

        {/* Months — single tap-through list with income built in */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{color:TXT,fontWeight:800,fontSize:18}}>Months <span style={{color:G1,fontWeight:500,fontSize:14}}>· {activeMonths.length}</span></span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:26}}>
          {activeMonths.length===0&&<div style={{color:G1,textAlign:"center",padding:"50px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No months yet.<br/>Tap <b>+ Month</b> to start.</div>}
          {activeMonths.slice().reverse().map(({month,year})=>{
            const{due,paid,groups:gc,students:sc}=monthStats(month,year);
            const myIncome=paid*(TEACHER_PCT/100);
            const pct=due>0?Math.min(100,Math.round((paid/due)*100)):0;
            const isCurrent=month===NOW_MONTH&&year===NOW_YEAR;
            return(
              <div key={`${year}-${month}-card`} onClick={()=>{setSelMonth(month);setView("month");}} className="tap"
                style={{background:BG2,border:`1.5px solid ${isCurrent?YD:G2}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",boxShadow:SH1}}>
                <div style={{display:"flex",alignItems:"center",gap:14}}>
                  <div style={{background:isCurrent?Y:BG3,borderRadius:12,padding:"8px 12px",textAlign:"center",flexShrink:0,minWidth:60}}>
                    <div style={{color:isCurrent?"#000":G1,fontSize:11,fontWeight:800,letterSpacing:"0.05em"}}>{MONTHS[month].slice(0,3).toUpperCase()}</div>
                    <div style={{color:isCurrent?"#000":TXT,fontSize:18,fontWeight:900}}>{year}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{color:TXT,fontWeight:800,fontSize:16}}>{MONTHS[month]}</span>
                      {isCurrent&&<span style={{background:Y,color:"#000",fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20}}>NOW</span>}
                    </div>
                    <div style={{color:G1,fontSize:12.5,marginTop:2}}>{gc} group{gc!==1?"s":""} · {sc} student{sc!==1?"s":""}</div>
                  </div>
                  <div style={{color:G1,fontSize:20,flexShrink:0}}>›</div>
                </div>
                <div style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:0,background:BG3,borderRadius:12,overflow:"hidden"}}>
                  {[["BILLED",fmt(due),TXT],["COLLECTED",fmt(paid),"#000"],[`YOUR (${TEACHER_PCT}%)`,fmt(myIncome),"#000"]].map(([l,v,c],i,arr)=>(
                    <div key={l} style={{flex:"1 1 90px",padding:"10px 12px",borderRight:i<arr.length-1?`1px solid ${G2}`:"none"}}>
                      <div style={{color:G1,fontSize:9.5,fontWeight:800,letterSpacing:"0.04em",marginBottom:3}}>{l}</div>
                      <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:10,height:5,background:BG3,borderRadius:4}}>
                  <div style={{height:"100%",borderRadius:4,background:Y,width:`${pct}%`,transition:"width .4s"}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Detailed analytics */}
        <PaymentSummary groups={groups}/>
      </div>

      <FAB onClick={()=>setAddingMonth(true)} label="New month">+ Month</FAB>
      {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}

      {/* Data & backup sheet */}
      {menuOpen&&(
        <Overlay onClose={()=>setMenuOpen(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>Data &amp; Backup</div>
          <button onClick={doBackup} style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:BG3,border:`1px solid ${G2}`,borderRadius:14,color:TXT,padding:"15px 16px",cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:10}}>
            <span style={{fontSize:20}}>⬇</span> Back up to file
          </button>
          <label style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:BG3,border:`1px solid ${G2}`,borderRadius:14,color:TXT,padding:"15px 16px",cursor:"pointer",fontSize:15,fontWeight:700}}>
            <span style={{fontSize:20}}>⬆</span> Restore from file
            <input type="file" accept=".json" onChange={doRestore} style={{display:"none"}}/>
          </label>
          {restoreMsg&&<div style={{color:restoreMsg.startsWith("✓")?GOOD:BAD,fontSize:14,fontWeight:700,marginTop:12}}>{restoreMsg}</div>}
          <div style={{color:G1,fontSize:12.5,marginTop:16,lineHeight:1.55}}>Your records are saved automatically on this device. Back up regularly so nothing is lost if your browser data is cleared.</div>
          <OutBtn onClick={()=>setMenuOpen(false)} style={{width:"100%",textAlign:"center",marginTop:18}}>Close</OutBtn>
        </Overlay>
      )}

      {/* Add month modal */}
      {addingMonth&&(
        <Overlay onClose={()=>setAddingMonth(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>Open Month</div>
          <Lbl>Select Month</Lbl>
          <select value={newMonthIdx} onChange={e=>setNewMonthIdx(Number(e.target.value))}
            style={{background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",width:"100%",marginBottom:18,WebkitAppearance:"none"}}>
            {MONTHS.map((m,i)=><option key={m} value={i}>{m} {NOW_YEAR}</option>)}
          </select>

          {activeMonths.length>0&&(
            <>
              <Lbl>Copy students from (optional)</Lbl>
              <select value={copyFromMonth} onChange={e=>setCopyFromMonth(e.target.value)}
                style={{background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",width:"100%",marginBottom:8,WebkitAppearance:"none"}}>
                <option value="">— Start empty —</option>
                {activeMonths.map(({month,year})=>(
                  <option key={`${year}-${month}`} value={`${month}-${year}`}>{MONTHS[month]} {year}</option>
                ))}
              </select>
              <div style={{color:G1,fontSize:12.5,marginBottom:22}}>Students are copied with payments reset to unpaid.</div>
            </>
          )}

          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setAddingMonth(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={()=>openMonth(newMonthIdx,NOW_YEAR,copyFromMonth||null)} style={{flex:2,textAlign:"center"}}>Open Month</YBtn>
          </div>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
