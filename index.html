// ── PDF Generator ──
function generatePDF(groups, month, year, allMonths){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const title=`My Classes — ${MONTHS[month]} ${year}`;
  doc.setFontSize(16);doc.setFont("helvetica","bold");
  doc.text(title,14,16);
  doc.setFontSize(9);doc.setFont("helvetica","normal");
  doc.text(`Generated: ${new Date().toLocaleDateString()}`,14,22);

  const monthGroups=groups.filter(g=>g.month===month&&g.year===year);
  let y=30;

  monthGroups.forEach(g=>{
    const totalDue=g.students.reduce((s,st)=>s+st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0),0);
    const totalPaid=g.students.reduce((s,st)=>s+st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0),0);

    if(y>250){doc.addPage();y=20;}
    doc.setFont("helvetica","bold");doc.setFontSize(12);
    doc.text(g.name,14,y);
    doc.setFont("helvetica","normal");doc.setFontSize(9);
    doc.text(`Total: ${fmt(totalDue)}  |  Collected: ${fmt(totalPaid)}  |  Remaining: ${fmt(totalDue-totalPaid)}`,14,y+6);
    y+=12;

    const rows=g.students.map(st=>{
      const due=st.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
      const paid=st.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
      const breakdown=st.payments.map(p=>`${p.label}: ${fmt(p.amount)} (${p.paid?"✓":"✗"})`).join(" | ");
      return[st.name, fmt(due), fmt(paid), fmt(due-paid), paid>=due&&due>0?"PAID":"UNPAID"];
    });

    doc.autoTable({
      startY:y, head:[["Student","Total Due","Paid","Remaining","Status"]],
      body:rows,
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
      alternateRowStyles:{fillColor:[245,245,245]},
      columnStyles:{4:{halign:"center"}},
      margin:{left:14,right:14},
    });
    y=doc.lastAutoTable.finalY+10;
  });

  // Summary page
  doc.addPage();
  doc.setFont("helvetica","bold");doc.setFontSize(14);
  doc.text(`Payment Summary — ${MONTHS[month]} ${year}`,14,20);
  y=30;

  const allPaid=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
  const allDue=monthGroups.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);

  // Payment amount breakdown
  const breakdown={};
  monthGroups.forEach(g=>g.students.forEach(st=>st.payments.filter(p=>p.paid&&p.amount>0).forEach(p=>{
    const k=p.amount;
    breakdown[k]=(breakdown[k]||0)+1;
  })));

  doc.autoTable({
    startY:y,
    head:[["Metric","Value"]],
    body:[
      ["Total Billed",fmt(allDue)],
      ["Total Collected",fmt(allPaid)],
      ["Uncollected",fmt(allDue-allPaid)],
      [`Your Income (${TEACHER_PCT}%)`,fmt(allPaid*(TEACHER_PCT/100))],
      [`Center Share (${100-TEACHER_PCT}%)`,fmt(allPaid*((100-TEACHER_PCT)/100))],
    ],
    styles:{fontSize:10},
    headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
    margin:{left:14,right:14},
  });
  y=doc.lastAutoTable.finalY+10;

  doc.setFont("helvetica","bold");doc.setFontSize(11);
  doc.text("Payment Amount Breakdown",14,y);y+=8;

  const bdRows=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0])).map(([amt,cnt])=>[fmt(Number(amt)),`${cnt} student${cnt!==1?"s":""}`,fmt(Number(amt)*cnt)]);
  doc.autoTable({
    startY:y, head:[["Amount","Count","Subtotal"]],
    body:bdRows,
    styles:{fontSize:9},
    headStyles:{fillColor:[255,214,0],textColor:[0,0,0],fontStyle:"bold"},
    margin:{left:14,right:14},
  });

  doc.save(`classes-${MONTHS[month]}-${year}.pdf`);
}

const YBtn=({onClick,style={},children})=>(
  <button onClick={onClick} style={{background:Y,border:"none",borderRadius:10,color:"#000",padding:"10px 20px",cursor:"pointer",fontSize:14,fontWeight:700,...style}}>{children}</button>
);
const OutBtn=({onClick,style={},children})=>(
  <button onClick={onClick} style={{background:"transparent",border:`1px solid ${G2}`,borderRadius:8,color:G1,padding:"8px 16px",cursor:"pointer",fontSize:13,...style}}>{children}</button>

const Overlay=({onClose,children})=>(
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>

// ── Student Modal (no personal info) ──
function StudentModal({student,onSave,onClose}){
  const[d,setD]=useState({...student,payments:student.payments.map(p=>({...p}))});
  const updP=(i,f,v)=>setD(x=>({...x,payments:x.payments.map((p,j)=>j===i?{...p,[f]:v}:p)}));
  const addP=()=>setD(x=>({...x,payments:[...x.payments,{id:uid(),label:"Additional payment",amount:0,paid:false}]}));
  const delP=i=>setD(x=>({...x,payments:x.payments.filter((_,j)=>j!==i)}));
  const totalDue=d.payments.reduce((a,p)=>a+(Number(p.amount)||0),0);
  const totalPaid=d.payments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
  return(
    <Overlay onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <span style={{color:TXT,fontWeight:800,fontSize:18}}>{d.name||"Student"}</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:G1,cursor:"pointer",fontSize:22}}>✕</button>
      </div>
      <Lbl>Student Name</Lbl>
      <Inp value={d.name} onChange={e=>setD(x=>({...x,name:e.target.value}))} placeholder="Student name" style={{marginBottom:20}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{color:TXT,fontWeight:700}}>Payment Records</span>
        <span style={{color:Y,fontSize:13,fontWeight:700,background:"#111",borderRadius:20,padding:"2px 10px"}}>{fmt(totalPaid)} / {fmt(totalDue)}</span>
      </div>
      {d.payments.map((p,i)=>(
        <div key={p.id} style={{background:p.paid?`${Y}22`:BG3,borderRadius:10,padding:12,marginBottom:10,border:p.paid?`1px solid ${YD}`:`1px solid ${G2}`}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <Inp value={p.label} onChange={e=>updP(i,"label",e.target.value)} placeholder="Payment label" style={{background:BG2}}/>
            {i>0&&<button onClick={()=>delP(i)} style={{background:"rgba(220,50,50,.1)",border:"1px solid rgba(220,50,50,.2)",color:"#c00",borderRadius:8,padding:"0 10px",cursor:"pointer"}}>✕</button>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{position:"relative",flex:1}}>
              <Inp type="number" value={p.amount} onChange={e=>updP(i,"amount",e.target.value)} style={{paddingRight:50,background:BG2}}/>
              <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:G1,fontSize:12}}>so'm</span>
            </div>
            <button onClick={()=>updP(i,"paid",!p.paid)} style={{padding:"10px 14px",borderRadius:8,border:"none",cursor:"pointer",background:p.paid?Y:BG3,color:p.paid?"#000":G1,fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>
              {p.paid?"✓ Paid":"Unpaid"}
            </button>
          </div>
        </div>
      ))}
      <OutBtn onClick={addP} style={{width:"100%",textAlign:"center",marginBottom:20,borderStyle:"dashed"}}>+ Add Extra Payment</OutBtn>
      <div style={{display:"flex",gap:10}}>
        <OutBtn onClick={onClose} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
        <YBtn onClick={()=>onSave(d)} style={{flex:2,textAlign:"center"}}>Save Changes</YBtn>
      </div>
    </Overlay>
  );
}

                <button onClick={()=>delSt(st.id)} style={{background:"rgba(200,0,0,.07)",border:"1px solid rgba(200,0,0,.15)",color:"#c00",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:13}}>✕</button>

          <div style={{display:"flex",gap:8}}>

      )}
      {editSt&&<StudentModal student={editSt} onSave={saveSt} onClose={()=>setEditSt(null)}/>}
    </div>
  );
}

// ── Month View ──
function MonthView({monthIdx,year,groups,onBack,onSelectGroup,onUpdateGroup,onDeleteGroup,onCreateGroup,allGroups}){
  const[creating,setCreating]=useState(false);

  const mg=groups.filter(g=>g.month===monthIdx&&g.year===year);

  const totalPaid=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);

  const create=()=>{
    if(!cName.trim())return;
    onCreateGroup({id:uid(),name:cName.trim(),month:monthIdx,year,students:[]});

        <div><div style={{color:"#00000077",fontSize:11}}>COLLECTED</div><div style={{color:"#000",fontWeight:700,fontSize:20}}>{fmt(totalPaid)}</div></div>
        <div><div style={{color:"#00000077",fontSize:11}}>REMAINING</div><div style={{color:"#444",fontWeight:700,fontSize:20}}>{fmt(totalDue-totalPaid)}</div></div>

// ── Payment Summary Section ──
function PaymentSummary({groups}){
  const[open,setOpen]=useState(true);
  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res;
  },[groups]);

  return(
    <div style={{background:BG2,border:`1px solid ${G2}`,borderRadius:16,marginBottom:24,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{background:Y,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <span style={{color:"#000",fontWeight:800,fontSize:15}}>📊 Payment Summary by Month</span>
        <span style={{color:"#000",fontSize:18}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{padding:0}}>
          {activeMonths.length===0&&<div style={{color:G1,padding:"20px",textAlign:"center"}}>No data yet.</div>}
          {activeMonths.map(({month,year})=>{
            const mg=groups.filter(g=>g.month===month&&g.year===year);
            const allStudents=mg.flatMap(g=>g.students);
            const allPayments=allStudents.flatMap(st=>st.payments);
            const totalDue=allPayments.reduce((a,p)=>a+(Number(p.amount)||0),0);
            const totalPaid=allPayments.filter(p=>p.paid).reduce((a,p)=>a+(Number(p.amount)||0),0);
            const uncollected=totalDue-totalPaid;

            // Breakdown: count each payment amount
            const breakdown={};
            allPayments.filter(p=>p.paid&&p.amount>0).forEach(p=>{
              const k=p.amount;
              breakdown[k]=(breakdown[k]||0)+1;
            });
            const bdEntries=Object.entries(breakdown).sort((a,b)=>Number(b[0])-Number(a[0]));

            return(
              <div key={`${year}-${month}`} style={{borderBottom:`1px solid ${G2}`,padding:"16px 20px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <span style={{color:TXT,fontWeight:800,fontSize:15}}>{MONTHS[month]} {year}</span>
                  <span style={{color:G1,fontSize:12}}>{mg.length} groups · {allStudents.length} students</span>
                </div>
                {/* Key figures */}
                <div style={{display:"flex",flexWrap:"wrap",gap:0,marginBottom:12,background:BG3,borderRadius:10,overflow:"hidden"}}>
                  {[["TOTAL BILLED",fmt(totalDue),TXT],["COLLECTED",fmt(totalPaid),"#000"],["UNCOLLECTED",fmt(uncollected),"#c00"],[`YOUR (${TEACHER_PCT}%)`,fmt(totalPaid*(TEACHER_PCT/100)),"#000"]].map(([l,v,c],i,arr)=>(
                    <div key={l} style={{flex:"1 1 100px",padding:"10px 14px",borderRight:i<arr.length-1?`1px solid ${G2}`:"none"}}>
                      <div style={{color:G1,fontSize:10,fontWeight:700,letterSpacing:"0.06em",marginBottom:3}}>{l}</div>
                      <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
                    </div>
                  ))}
                </div>
                {/* Payment breakdown */}
                {bdEntries.length>0&&(
                  <div>
                    <div style={{color:G1,fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:8}}>PAYMENT BREAKDOWN</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {bdEntries.map(([amt,cnt])=>(
                        <div key={amt} style={{background:Y,borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
                          <span style={{color:"#000",fontWeight:700,fontSize:13}}>{fmtShort(Number(amt))}</span>
                          <span style={{color:"#00000088",fontSize:11}}>×{cnt}</span>
                          <span style={{color:"#444",fontSize:11}}>= {fmtShort(Number(amt)*cnt)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ──
function App(){
  const[groups,setGroups]=useState(()=>{ const d=window._loadData(); return d||MARCH_DATA; });
  const[view,setView]=useState("home");
  const[selMonth,setSelMonth]=useState(null);
  const[selGroup,setSelGroup]=useState(null);
  const[addingMonth,setAddingMonth]=useState(false);
  const[newMonthIdx,setNewMonthIdx]=useState(NOW_MONTH);
  const[copyFromMonth,setCopyFromMonth]=useState("");
  const[saved,setSaved]=useState(false);
  const[restoreMsg,setRestoreMsg]=useState("");

  // Auto-save
  useEffect(()=>{
    window._saveData(groups);
    setSaved(true);
    const t=setTimeout(()=>setSaved(false),1200);
    return()=>clearTimeout(t);
  },[groups]);

  // Auto PDF on 5th of month
  useEffect(()=>{
    const today=new Date();
    if(today.getDate()===5){
      const key=`autoPDF_${today.getFullYear()}_${today.getMonth()}`;
      if(!localStorage.getItem(key)){
        const prevMonth=today.getMonth()===0?11:today.getMonth()-1;
        const prevYear=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
        const hasData=groups.some(g=>g.month===prevMonth&&g.year===prevYear);
        if(hasData){
          setTimeout(()=>{
            generatePDF(groups,prevMonth,prevYear,groups);
            localStorage.setItem(key,"done");
          },2000);
        }
      }
    }
  },[]);

  const updGroup=useCallback(g=>setGroups(p=>p.map(x=>x.id===g.id?g:x)),[]);
  const addGroup=useCallback(g=>setGroups(p=>[...p,g]),[]);
  const delGroup=useCallback(id=>setGroups(p=>p.filter(x=>x.id!==id)),[]);

  // Copy students from one month to a new month
  const openMonth=(targetMonth,targetYear,copyKey)=>{
    if(copyKey){
      const[cm,cy]=copyKey.split("-").map(Number);
      const srcGroups=groups.filter(g=>g.month===cm&&g.year===cy);
      srcGroups.forEach(g=>{
        const already=groups.some(x=>x.month===targetMonth&&x.year===targetYear&&x.name===g.name);
        if(!already){
          const newGroup={
            ...g,
            id:uid(),
            month:targetMonth,
            year:targetYear,
            students:g.students.map(st=>({
              ...st,
              id:uid(),
              payments:st.payments.map(p=>({...p,id:uid(),paid:false}))
            }))
          };
          addGroup(newGroup);
        }
      });
    }
    setSelMonth(targetMonth);
    setView("month");
    setAddingMonth(false);
  };

  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res;
  },[groups]);

  const monthStats=(month,year)=>{
    const mg=groups.filter(g=>g.month===month&&g.year===year);
    const due=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    const paid=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    return{due,paid,groups:mg.length,students:mg.reduce((s,g)=>s+g.students.length,0)};
  };

  const doBackup=()=>{
    const blob=new Blob([JSON.stringify(groups,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();
    a.href=url;
    a.download=`myclasses-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doRestore=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!Array.isArray(parsed))throw new Error();
        setGroups(parsed);
        setRestoreMsg("✓ Restored!");
        setTimeout(()=>setRestoreMsg(""),3000);
      }catch{
        setRestoreMsg("✗ Invalid file");
        setTimeout(()=>setRestoreMsg(""),3000);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // ── Routing ──
  if(view==="group"&&selGroup){
    const grp=groups.find(g=>g.id===selGroup);
    if(!grp){setView("month");return null;}
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"24px 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <GroupView group={grp} monthLabel={`${MONTHS[grp.month]} ${grp.year}`}
            onBack={()=>setView("month")} onUpdate={g=>{updGroup(g);}}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:20,right:20,background:"#111",color:Y,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Saved</div>}
      </div>
    );
  }

  if(view==="month"&&selMonth!==null){
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"24px 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <MonthView monthIdx={selMonth} year={NOW_YEAR} groups={groups}
            onBack={()=>setView("home")}
            onSelectGroup={id=>{setSelGroup(id);setView("group");}}
            onUpdateGroup={updGroup} onDeleteGroup={delGroup} onCreateGroup={addGroup}
            allGroups={groups}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:20,right:20,background:"#111",color:Y,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Saved</div>}
      </div>
    );
  }

  // ── Home ──
  return(
    <div style={{minHeight:"100vh",background:BG,padding:"24px 16px 40px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
          <div style={{background:Y,borderRadius:14,padding:"8px 13px",fontSize:36,lineHeight:1}}>🎓</div>
          <div style={{flex:1}}>
            <h1 style={{margin:0,color:TXT,fontSize:26,fontWeight:900,letterSpacing:"-0.5px"}}>My Classes</h1>
            <p style={{margin:"4px 0 0",color:G1,fontSize:13}}>Educational Center</p>
          </div>
        </div>

        {/* Backup & Restore */}
        <div style={{display:"flex",gap:8,marginBottom:22,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={doBackup} style={{display:"flex",alignItems:"center",gap:6,background:BG2,border:`1px solid ${G2}`,borderRadius:10,color:TXT,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 1px 3px rgba(0,0,0,.07)"}}>
            ⬇ Backup
          </button>
          <label style={{display:"flex",alignItems:"center",gap:6,background:BG2,border:`1px solid ${G2}`,borderRadius:10,color:TXT,padding:"9px 16px",cursor:"pointer",fontSize:13,fontWeight:600,boxShadow:"0 1px 3px rgba(0,0,0,.07)"}}>
            ⬆ Restore
            <input type="file" accept=".json" onChange={doRestore} style={{display:"none"}}/>
          </label>
          {restoreMsg&&<span style={{color:restoreMsg.startsWith("✓")?"#080":"#c00",fontSize:13,fontWeight:700}}>{restoreMsg}</span>}
        </div>

        {/* Monthly income overview */}
        <div style={{color:G1,fontSize:11,fontWeight:700,letterSpacing:"0.1em",marginBottom:12}}>MONTHLY INCOME OVERVIEW</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          {activeMonths.length===0&&<div style={{color:G1,fontSize:14,padding:"20px 0"}}>No data yet.</div>}
          {activeMonths.map(({month,year})=>{
            const{due,paid}=monthStats(month,year);
            const myIncome=paid*(TEACHER_PCT/100);
            const isCurrent=month===NOW_MONTH&&year===NOW_YEAR;
            return(
              <div key={`${year}-${month}-inc`} style={{background:isCurrent?Y:BG2,border:`1px solid ${isCurrent?YD:G2}`,borderRadius:16,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{background:isCurrent?"rgba(0,0,0,.08)":"#F8F8F8",padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{color:isCurrent?"#000":TXT,fontWeight:800,fontSize:15}}>{MONTHS[month]} {year}</span>

                </div>
                <div style={{padding:"14px 18px",display:"flex",flexWrap:"wrap",gap:0}}>
                  {[["TOTAL BILLED",fmt(due),TXT],["COLLECTED",fmt(paid),TXT],[`YOUR INCOME (${TEACHER_PCT}%)`,fmt(myIncome),"#000"],[`CENTER (${100-TEACHER_PCT}%)`,fmt(paid*((100-TEACHER_PCT)/100)),G1]].map(([label,val,col],i,arr)=>(

                      <div style={{color:isCurrent?"#000":col,fontWeight:800,fontSize:14}}>{val}</div>

                </div>
              </div>
            );
          })}
        </div>

        {/* Payment Summary Section */}
        <PaymentSummary groups={groups}/>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{color:TXT,fontWeight:800,fontSize:18}}>Months <span style={{color:G1,fontWeight:400,fontSize:14}}>({activeMonths.length})</span></span>

            return(
              <div key={`${year}-${month}-card`} onClick={()=>{setSelMonth(month);setView("month");}}
                style={{background:BG2,border:`1px solid ${isCurrent?YD:G2}`,borderLeft:`4px solid ${Y}`,borderRadius:14,padding:"18px 22px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}
                onTouchStart={e=>e.currentTarget.style.background=BG3} onTouchEnd={e=>e.currentTarget.style.background=BG2}
                onMouseEnter={e=>e.currentTarget.style.background=BG3} onMouseLeave={e=>e.currentTarget.style.background=BG2}>
                <div style={{background:isCurrent?Y:BG3,borderRadius:10,padding:"10px 14px",textAlign:"center",flexShrink:0}}>
                  <div style={{color:isCurrent?"#000":G1,fontSize:11,fontWeight:700}}>{MONTHS[month].slice(0,3).toUpperCase()}</div>
                  <div style={{color:isCurrent?"#000":TXT,fontSize:20,fontWeight:900}}>{year}</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:TXT,fontWeight:700,fontSize:16}}>{MONTHS[month]} {year}</span>
                    {isCurrent&&<span style={{background:Y,color:"#000",fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20}}>CURRENT</span>}
                  </div>
                  <div style={{color:G1,fontSize:13,marginTop:2}}>{gc} group{gc!==1?"s":""} · {sc} student{sc!==1?"s":""}</div>
                  <div style={{marginTop:10,display:"flex",gap:16}}>
                    <div><div style={{color:G1,fontSize:11}}>TOTAL</div><div style={{color:TXT,fontWeight:700,fontSize:14}}>{fmt(due)}</div></div>
                    <div><div style={{color:G1,fontSize:11}}>COLLECTED</div><div style={{color:"#000",fontWeight:700,fontSize:14}}>{fmt(paid)}</div></div>
                  </div>
                </div>
                <div style={{color:G1,fontSize:20}}>›</div>
              </div>
            );
          })}
        </div>
      </div>

      {saved&&<div style={{position:"fixed",bottom:20,right:20,background:"#111",color:Y,borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:700}}>✓ Saved</div>}

      {/* Add month modal */}
      {addingMonth&&(
        <Overlay onClose={()=>setAddingMonth(false)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <span style={{color:TXT,fontWeight:800,fontSize:18}}>Open Month</span>
            <button onClick={()=>setAddingMonth(false)} style={{background:"none",border:"none",color:G1,cursor:"pointer",fontSize:22}}>✕</button>
          </div>
          <Lbl>Select Month</Lbl>
          <select value={newMonthIdx} onChange={e=>setNewMonthIdx(Number(e.target.value))}
            style={{background:BG3,border:`1px solid ${G2}`,borderRadius:8,color:TXT,padding:"10px 14px",fontSize:14,outline:"none",width:"100%",marginBottom:16,boxSizing:"border-box"}}>
            {MONTHS.map((m,i)=><option key={m} value={i}>{m} {NOW_YEAR}</option>)}
          </select>

          {activeMonths.length>0&&(
            <>
              <Lbl>COPY STUDENTS FROM (optional)</Lbl>
              <select value={copyFromMonth} onChange={e=>setCopyFromMonth(e.target.value)}
                style={{background:BG3,border:`1px solid ${G2}`,borderRadius:8,color:TXT,padding:"10px 14px",fontSize:14,outline:"none",width:"100%",marginBottom:6,boxSizing:"border-box"}}>
                <option value="">— Start empty —</option>
                {activeMonths.map(({month,year})=>(
                  <option key={`${year}-${month}`} value={`${month}-${year}`}>{MONTHS[month]} {year}</option>
                ))}
              </select>
              <div style={{color:G1,fontSize:12,marginBottom:20}}>Students will be copied with payments reset to unpaid.</div>
            </>
          )}

          <div style={{display:"flex",gap:10}}>
            <OutBtn onClick={()=>setAddingMonth(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
            <YBtn onClick={()=>openMonth(newMonthIdx,NOW_YEAR,copyFromMonth||null)} style={{flex:2,textAlign:"center"}}>Open Month</YBtn>
          </div>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
