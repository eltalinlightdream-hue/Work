// Single-student report — charts vs group + lesson table
function StudentReport({pid,groups,perf,onBack,onExport}){
  const[range,setRange]=useState("month");
  const person=rosterByPid(groups)[pid];
  const ref=refDateFor(person?person.month:NOW_MONTH,person?person.year:NOW_YEAR);
  const win=rangeWindow(range,ref);
  const {lessons,totals}=useMemo(()=>studentReport(groups,perf,pid,win),[groups,perf,pid,range]);
  const grp=useMemo(()=>person?groupReport(groups,perf,person.groupName,win):{lessons:[]},[groups,perf,pid,range]);
  const rate=pct(totals.done,totals.partial,totals.missed);
  const dateAvg={}; grp.lessons.forEach(l=>{dateAvg[l.date]=pct(l.done,l.partial,l.missed);});
  const primary=lessons.map(l=>l.status==="done"?100:l.status==="partial"?50:0);
  const compare=lessons.map(l=>dateAvg[l.date]!=null?dateAvg[l.date]:0);
  const lbls=lessons.map(l=>shortDate(l.date));
  const tag={done:{bg:"#E3F5EA",c:GOOD,t:"Done"},partial:{bg:"#FFF3DC",c:"#B8770B",t:"Partial"},missed:{bg:"#FDECEC",c:BAD,t:"Missed"}};
  if(!person)return(<div style={{padding:40,textAlign:"center",color:G1}}>Student not found.<OutBtn onClick={onBack} style={{marginTop:16}}>Back</OutBtn></div>);
  return(
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <BackBtn onClick={onBack}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:G1,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{person.name} · report</div>
          <h2 style={{margin:0,color:TXT,fontSize:19,fontWeight:800}}>Student Report</h2>
        </div>
        <button onClick={()=>onExport(range)} aria-label="Export PDF" style={{background:"#111",border:"none",borderRadius:12,color:"#fff",height:44,padding:"0 14px",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>📄 PDF</button>
      </div>
      <div style={{marginBottom:16}}><Segmented value={range} onChange={setRange} options={[{key:"week",label:"Week"},{key:"month",label:"Month"},{key:"3mo",label:"3 mo"},{key:"6mo",label:"6 mo"}]}/></div>

      <div style={{display:"flex",gap:12,marginBottom:16}}>
        <div style={{flex:1,background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:14,textAlign:"center",boxShadow:SH1}}>
          <Donut size={92} segments={[{value:totals.done,color:Y},{value:totals.partial,color:PART},{value:totals.missed,color:BAD}]} centerLabel={`${rate}%`} centerSub="rate"/>
          <div style={{fontSize:12,color:G1,marginTop:4,fontWeight:700}}>Homework rate</div>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:"13px 15px",boxShadow:SH1}}><div style={{color:G1,fontSize:10,fontWeight:800}}>DONE</div><div style={{fontWeight:800,fontSize:22,color:GOOD}}>{totals.done}</div></div>
          <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:"13px 15px",boxShadow:SH1}}><div style={{color:G1,fontSize:10,fontWeight:800}}>MISSED</div><div style={{fontWeight:800,fontSize:22,color:BAD}}>{totals.missed}</div></div>
        </div>
      </div>

      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:"14px 14px 10px",marginBottom:14,boxShadow:SH1}}>
        <Lbl>Trend vs group average · line</Lbl>
        <LineChart primary={primary} compare={compare} labels={lbls.length<=8?lbls:[]} height={120}/>
        <div style={{display:"flex",gap:16,fontSize:11,color:G1,marginTop:2}}>
          <span><span style={{display:"inline-block",width:14,height:3,background:YD,verticalAlign:"middle"}}/> {person.name.split(" ")[0]}</span>
          <span><span style={{display:"inline-block",width:14,height:3,background:G2,verticalAlign:"middle"}}/> Group avg</span>
        </div>
      </div>

      <div style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,overflow:"hidden",boxShadow:SH1}}>
        <div style={{padding:"12px 14px 4px"}}><Lbl>Lesson by lesson · table</Lbl></div>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
          <tbody>
            {lessons.length===0&&<tr><td style={{padding:"20px",textAlign:"center",color:G1}}>No homework in this range.</td></tr>}
            {lessons.slice().reverse().map((l,i)=>{const t=tag[l.status]||{bg:BG3,c:G1,t:"—"};return(
              <tr key={i} style={{borderTop:i?`1px solid ${G2}`:"none"}}>
                <td style={{padding:"11px 14px",whiteSpace:"nowrap"}}>{shortDate(l.date)}</td>
                <td style={{padding:"11px 14px",color:G1,overflow:"hidden",textOverflow:"ellipsis",maxWidth:0}}>{l.homework||"—"}</td>
                <td style={{padding:"11px 14px",textAlign:"right"}}><span style={{background:t.bg,color:t.c,fontSize:11,fontWeight:800,padding:"4px 10px",borderRadius:20,whiteSpace:"nowrap"}}>{t.t}</span></td>
              </tr>);})}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Main App ──
const loadObj=(k)=>{ try{const s=localStorage.getItem(k)||sessionStorage.getItem(k); if(s){const o=JSON.parse(s); if(o&&typeof o==="object"&&!Array.isArray(o))return o;} }catch(e){} return {}; };
function App(){
  const[groups,setGroups]=useState(()=>{
    const d=window._loadData(SAVE_KEY);
    const base=(d&&d.length)?d:MARCH_DATA;
    return base.map(g=>({...g,students:(g.students||[]).map(st=>st.pid?st:{...st,pid:st.id})}));
  });
  const[newcomers,setNewcomers]=useState(()=>{ const d=window._loadData(NEWCOMERS_KEY); return d||[]; });
  const[portfolios,setPortfolios]=useState(()=>loadObj(PORT_KEY));
  const[performance,setPerformance]=useState(()=>loadObj(PERF_KEY));
  const[view,setView]=useState("home");
  const[selMonth,setSelMonth]=useState(null);
  const[selGroup,setSelGroup]=useState(null);
  const[perfMonth,setPerfMonth]=useState(null);
  const[perfYear,setPerfYear]=useState(NOW_YEAR);
  const[reportGroup,setReportGroup]=useState(null);
  const[selPid,setSelPid]=useState(null);
  const[studentBack,setStudentBack]=useState("portfolio");
  const[pdfReq,setPdfReq]=useState(null);
  const[addingMonth,setAddingMonth]=useState(false);
  const[newMonthIdx,setNewMonthIdx]=useState(NOW_MONTH);
  const[copyFromMonth,setCopyFromMonth]=useState("");
  const[saved,setSaved]=useState(false);
  const[restoreMsg,setRestoreMsg]=useState("");
  const[menuOpen,setMenuOpen]=useState(false);

  // Auto-save
  useEffect(()=>{
    window._saveData(SAVE_KEY,groups);
    setSaved(true);
    const t=setTimeout(()=>setSaved(false),1200);
    return()=>clearTimeout(t);
  },[groups]);

  useEffect(()=>{
    window._saveData(NEWCOMERS_KEY,newcomers);
    setSaved(true);
    const t=setTimeout(()=>setSaved(false),1200);
    return()=>clearTimeout(t);
  },[newcomers]);

  useEffect(()=>{ window._saveData(PORT_KEY,portfolios); },[portfolios]);
  useEffect(()=>{ window._saveData(PERF_KEY,performance); },[performance]);

  // Keep performance + portfolios in sync with the payment roster (cascade delete)
  useEffect(()=>{
    const groupById={}; groups.forEach(g=>groupById[g.id]=g);
    setPerformance(prev=>{
      let changed=false; const next={};
      Object.entries(prev).forEach(([gid,gp])=>{
        const g=groupById[gid]; if(!g){changed=true;return;}
        const valid=new Set(g.students.map(s=>s.pid||s.id));
        const lessons={};
        Object.entries(gp.lessons||{}).forEach(([d,ls])=>{
          const records={}; Object.entries(ls.records||{}).forEach(([pid,v])=>{ if(valid.has(pid))records[pid]=v; else changed=true; });
          lessons[d]={...ls,records};
        });
        next[gid]={...gp,lessons};
      });
      return changed?next:prev;
    });
    setPortfolios(prev=>{
      const alive=new Set(); groups.forEach(g=>g.students.forEach(s=>alive.add(s.pid||s.id)));
      let changed=false; const next={};
      Object.entries(prev).forEach(([pid,v])=>{ if(alive.has(pid))next[pid]=v; else changed=true; });
      return changed?next:prev;
    });
  },[groups]);

  // Auto PDF on 5th of month
  useEffect(()=>{
    const today=new Date();
    if(today.getDate()===5){
      const key=`autoPDF_${today.getFullYear()}_${today.getMonth()}`;
      if(!localStorage.getItem(key)){
        const prevMonth=today.getMonth()===0?11:today.getMonth()-1;
        const prevYear=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
        const hasData=groups.some(g=>g.month===prevMonth&&g.year===prevYear);
        if(hasData){
          setTimeout(()=>{
            generatePDF(groups,prevMonth,prevYear,groups);
            localStorage.setItem(key,"done");
          },2000);
        }
      }
    }
  },[]);

  const updGroup=useCallback(g=>setGroups(p=>p.map(x=>x.id===g.id?g:x)),[]);
  const addGroup=useCallback(g=>setGroups(p=>[...p,g]),[]);
  const delGroup=useCallback(id=>setGroups(p=>p.filter(x=>x.id!==id)),[]);

  const addNewcomer=useCallback(n=>setNewcomers(p=>[...p,n]),[]);
  const updNewcomer=useCallback(n=>setNewcomers(p=>p.map(x=>x.id===n.id?n:x)),[]);
  const delNewcomer=useCallback(id=>setNewcomers(p=>p.filter(x=>x.id!==id)),[]);

  // Performance + portfolio handlers
  const updatePerf=useCallback((gid,gp)=>setPerformance(p=>({...p,[gid]:gp})),[]);
  const ensurePerf=useCallback((g)=>{
    setPerformance(p=>{
      const ex=p[g.id];
      if(ex&&ex.lessons&&Object.keys(ex.lessons).length)return p;
      const schedule=(ex&&ex.schedule)||scheduleFromName(g.name);
      const lessons=(ex&&ex.lessons)?{...ex.lessons}:{};
      if(!Object.keys(lessons).length)parityDatesForMonth(g.year,g.month,schedule).forEach(d=>lessons[d]={records:{}});
      return {...p,[g.id]:{schedule,defaultHomework:(ex&&ex.defaultHomework)||"",lessons}};
    });
  },[]);
  const savePortfolio=useCallback((pid,data)=>setPortfolios(p=>({...p,[pid]:data})),[]);
  const openGrid=(id)=>{ const g=groups.find(x=>x.id===id); if(g)ensurePerf(g); setSelGroup(id); setView("perf-group"); };
  const openStudentReport=(pid,back)=>{ setSelPid(pid); setStudentBack(back); setView("student-report"); };
  const runPdf=(lang)=>{
    const r=pdfReq; setPdfReq(null); if(!r)return;
    setTimeout(()=>{
      try{
        if(r.kind==="payment")generatePDF(groups,r.month,r.year,groups,lang);
        else if(r.kind==="group")generatePerformancePDF(groups,performance,r.groupName,r.month,r.year,r.range,lang);
        else if(r.kind==="student"){ const p=rosterByPid(groups)[r.pid]||{}; generateStudentPDF(groups,performance,portfolios,r.pid,p.name||"student",p.groupName||"",p.month??NOW_MONTH,p.year??NOW_YEAR,r.range,lang); }
      }catch(e){ console.error("PDF error",e); }
    },40);
  };

  // Copy students from one month to a new month
  const openMonth=(targetMonth,targetYear,copyKey)=>{
    if(copyKey){
      const[cm,cy]=copyKey.split("-").map(Number);
      const srcGroups=groups.filter(g=>g.month===cm&&g.year===cy);
      srcGroups.forEach(g=>{
        const already=groups.some(x=>x.month===targetMonth&&x.year===targetYear&&x.name===g.name);
        if(!already){
          const newGroup={
            ...g,
            id:uid(),
            month:targetMonth,
            year:targetYear,
            students:g.students.map(st=>({
              ...st,
              id:uid(),
              pid:st.pid||st.id,
              payments:st.payments.map(p=>({...p,id:uid(),paid:false}))
            }))
          };
          addGroup(newGroup);
        }
      });
    }
    setSelMonth(targetMonth);
    setView("month");
    setAddingMonth(false);
  };

  const activeMonths=useMemo(()=>{
    const seen=new Set();const res=[];
    groups.forEach(g=>{const k=`${g.year}-${g.month}`;if(!seen.has(k)){seen.add(k);res.push({month:g.month,year:g.year});}});
    res.sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
    return res;
  },[groups]);

  const monthStats=(month,year)=>{
    const mg=groups.filter(g=>g.month===month&&g.year===year);
    const due=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    const paid=mg.reduce((s,g)=>s+g.students.reduce((a,st)=>a+st.payments.filter(p=>p.paid).reduce((b,p)=>b+(Number(p.amount)||0),0),0),0);
    return{due,paid,groups:mg.length,students:mg.reduce((s,g)=>s+g.students.length,0)};
  };

  const doBackup=()=>{
    const blob=new Blob([JSON.stringify({groups,newcomers,portfolios,performance},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();
    a.href=url;
    a.download=`myclasses-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doRestore=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(Array.isArray(parsed)){
          setGroups(parsed);
        }else if(parsed&&Array.isArray(parsed.groups)){
          setGroups(parsed.groups.map(g=>({...g,students:(g.students||[]).map(st=>st.pid?st:{...st,pid:st.id})})));
          setNewcomers(Array.isArray(parsed.newcomers)?parsed.newcomers:[]);
          if(parsed.portfolios&&typeof parsed.portfolios==="object")setPortfolios(parsed.portfolios);
          if(parsed.performance&&typeof parsed.performance==="object")setPerformance(parsed.performance);
        }else{
          throw new Error();
        }
        setRestoreMsg("✓ Restored!");
        setTimeout(()=>setRestoreMsg(""),3000);
      }catch{
        setRestoreMsg("✗ Invalid file");
        setTimeout(()=>setRestoreMsg(""),3000);
      }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  // ── Routing ──
  if(view==="newcomers"){
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"calc(34px + var(--safe-top)) 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <NewcomersView newcomers={newcomers} groups={groups}
            onBack={()=>setView("payments")}
            onAdd={addNewcomer} onUpdate={updNewcomer} onDelete={delNewcomer}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}
      </div>
    );
  }

  if(view==="group"&&selGroup){
    const grp=groups.find(g=>g.id===selGroup);
    if(!grp){setView("month");return null;}
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"calc(34px + var(--safe-top)) 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <GroupView group={grp} monthLabel={`${MONTHS[grp.month]} ${grp.year}`}
            onBack={()=>setView("month")} onUpdate={g=>{updGroup(g);}}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}
      </div>
    );
  }

  if(view==="month"&&selMonth!==null){
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"calc(34px + var(--safe-top)) 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <MonthView monthIdx={selMonth} year={NOW_YEAR} groups={groups}
            onBack={()=>setView("payments")}
            onSelectGroup={id=>{setSelGroup(id);setView("group");}}
            onUpdateGroup={updGroup} onDeleteGroup={delGroup} onCreateGroup={addGroup}
            allGroups={groups} onRequestPDF={(m,y)=>setPdfReq({kind:"payment",month:m,year:y})}/>
        </div>
        {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}
        {pdfReq&&<LangPicker onPick={runPdf} onClose={()=>setPdfReq(null)}/>}
      </div>
    );
  }

  // ── Shared page shell for the new sections ──
  const savedTag=saved?<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>:null;
  const shell=(inner)=>(
    <div style={{minHeight:"100vh",background:BG,padding:"calc(34px + var(--safe-top)) 16px 40px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>{inner}</div>
      {savedTag}
      {pdfReq&&<LangPicker onPick={runPdf} onClose={()=>setPdfReq(null)}/>}
    </div>
  );

  if(view==="performance"){
    const pm=perfMonth!=null?perfMonth:NOW_MONTH, py=perfMonth!=null?perfYear:NOW_YEAR;
    return shell(<PerformanceHome monthIdx={pm} year={py} groups={groups} perf={performance} activeMonths={activeMonths}
      onBack={()=>setView("home")} onOpenGrid={openGrid}
      onOpenReport={(name)=>{setReportGroup({name,month:pm,year:py,back:"performance"});setView("perf-report");}}
      onChangeMonth={(m,y)=>{setPerfMonth(m);setPerfYear(y);}}/>);
  }
  if(view==="perf-group"&&selGroup){
    const grp=groups.find(g=>g.id===selGroup);
    if(!grp){setView("performance");return null;}
    const gp=performance[grp.id]||{schedule:scheduleFromName(grp.name),defaultHomework:"",lessons:{}};
    return shell(<HomeworkGrid group={grp} gp={gp} monthIdx={grp.month} year={grp.year}
      onBack={()=>setView("performance")} onChange={(ngp)=>updatePerf(grp.id,ngp)}
      onOpenReport={(name)=>{setReportGroup({name,month:grp.month,year:grp.year,back:"perf-group"});setView("perf-report");}}
      onOpenStudent={(pid)=>openStudentReport(pid,"perf-group")}/>);
  }
  if(view==="perf-report"&&reportGroup){
    return shell(<GroupReport groupName={reportGroup.name} monthIdx={reportGroup.month} year={reportGroup.year}
      groups={groups} perf={performance} onBack={()=>setView(reportGroup.back||"performance")}
      onExport={(range)=>setPdfReq({kind:"group",groupName:reportGroup.name,month:reportGroup.month,year:reportGroup.year,range})}/>);
  }
  if(view==="portfolio"){
    return shell(<PortfolioList groups={groups} perf={performance} portfolios={portfolios}
      onBack={()=>setView("home")} onOpenStudent={(pid)=>{setSelPid(pid);setView("portfolio-student");}}/>);
  }
  if(view==="portfolio-student"&&selPid){
    return shell(<PortfolioDetail pid={selPid} groups={groups} perf={performance} portfolios={portfolios}
      onBack={()=>setView("portfolio")} onSave={savePortfolio}
      onOpenReport={(pid)=>openStudentReport(pid,"portfolio-student")}
      onExport={(pid)=>setPdfReq({kind:"student",pid,range:"month"})}/>);
  }
  if(view==="student-report"&&selPid){
    return shell(<StudentReport pid={selPid} groups={groups} perf={performance}
      onBack={()=>setView(studentBack)}
      onExport={(range)=>setPdfReq({kind:"student",pid:selPid,range})}/>);
  }

  // ── Payments section (months, groups, newcomers, summary) ──
  if(view==="payments"){
    return(
      <div style={{minHeight:"100vh",background:BG,padding:"calc(34px + var(--safe-top)) 16px 40px"}}>
        <div style={{maxWidth:760,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
            <BackBtn onClick={()=>setView("home")}/>
            <div style={{flex:1,minWidth:0}}>
              <h2 style={{margin:0,color:TXT,fontSize:21,fontWeight:800}}>Payments</h2>
              <div style={{color:G1,fontSize:13}}>{activeMonths.length} month{activeMonths.length!==1?"s":""}</div>
            </div>
          </div>

          <div onClick={()=>setView("newcomers")} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:"16px 18px",marginBottom:22,display:"flex",alignItems:"center",gap:14,cursor:"pointer",boxShadow:SH1}}>
            <div style={{width:44,height:44,borderRadius:12,background:YSOFT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📇</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:TXT,fontWeight:800,fontSize:16}}>Newcomers</div>
              <div style={{color:G1,fontSize:12.5,marginTop:2}}>{newcomers.length} student{newcomers.length!==1?"s":""} tracked</div>
            </div>
            <div style={{color:G1,fontSize:20,flexShrink:0}}>›</div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{color:TXT,fontWeight:800,fontSize:18}}>Months <span style={{color:G1,fontWeight:500,fontSize:14}}>· {activeMonths.length}</span></span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:26}}>
            {activeMonths.length===0&&<div style={{color:G1,textAlign:"center",padding:"50px 0",border:`1.5px dashed ${G2}`,borderRadius:14,background:BG2}}>No months yet.<br/>Tap <b>+ Month</b> to start.</div>}
            {activeMonths.slice().reverse().map(({month,year})=>{
              const{due,paid,groups:gc,students:sc}=monthStats(month,year);
              const myIncome=paid*(TEACHER_PCT/100);
              const pctv=due>0?Math.min(100,Math.round((paid/due)*100)):0;
              const isCurrent=month===NOW_MONTH&&year===NOW_YEAR;
              return(
                <div key={`${year}-${month}-card`} onClick={()=>{setSelMonth(month);setView("month");}} className="tap"
                  style={{background:BG2,border:`1.5px solid ${isCurrent?YD:G2}`,borderRadius:16,padding:"16px 18px",cursor:"pointer",boxShadow:SH1}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div style={{background:isCurrent?Y:BG3,borderRadius:12,padding:"8px 12px",textAlign:"center",flexShrink:0,minWidth:60}}>
                      <div style={{color:isCurrent?"#000":G1,fontSize:11,fontWeight:800,letterSpacing:"0.05em"}}>{MONTHS[month].slice(0,3).toUpperCase()}</div>
                      <div style={{color:isCurrent?"#000":TXT,fontSize:18,fontWeight:900}}>{year}</div>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{color:TXT,fontWeight:800,fontSize:16}}>{MONTHS[month]}</span>
                        {isCurrent&&<span style={{background:Y,color:"#000",fontSize:10,fontWeight:800,padding:"2px 8px",borderRadius:20}}>NOW</span>}
                      </div>
                      <div style={{color:G1,fontSize:12.5,marginTop:2}}>{gc} group{gc!==1?"s":""} · {sc} student{sc!==1?"s":""}</div>
                    </div>
                    <div style={{color:G1,fontSize:20,flexShrink:0}}>›</div>
                  </div>
                  <div style={{marginTop:14,display:"flex",flexWrap:"wrap",gap:0,background:BG3,borderRadius:12,overflow:"hidden"}}>
                    {[["BILLED",fmt(due),TXT],["COLLECTED",fmt(paid),"#000"],[`YOUR (${TEACHER_PCT}%)`,fmt(myIncome),"#000"]].map(([l,v,c],i,arr)=>(
                      <div key={l} style={{flex:"1 1 90px",padding:"10px 12px",borderRight:i<arr.length-1?`1px solid ${G2}`:"none"}}>
                        <div style={{color:G1,fontSize:9.5,fontWeight:800,letterSpacing:"0.04em",marginBottom:3}}>{l}</div>
                        <div style={{color:c,fontWeight:800,fontSize:13}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:10,height:5,background:BG3,borderRadius:4}}>
                    <div style={{height:"100%",borderRadius:4,background:Y,width:`${pctv}%`,transition:"width .4s"}}/>
                  </div>
                </div>
              );
            })}
          </div>

          <PaymentSummary groups={groups}/>
        </div>

        <FAB onClick={()=>setAddingMonth(true)} label="New month">+ Month</FAB>
        {savedTag}
        {pdfReq&&<LangPicker onPick={runPdf} onClose={()=>setPdfReq(null)}/>}
        {addingMonth&&(
          <Overlay onClose={()=>setAddingMonth(false)}>
            <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>Open Month</div>
            <Lbl>Select Month</Lbl>
            <select value={newMonthIdx} onChange={e=>setNewMonthIdx(Number(e.target.value))}
              style={{background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",width:"100%",marginBottom:18,WebkitAppearance:"none"}}>
              {MONTHS.map((m,i)=><option key={m} value={i}>{m} {NOW_YEAR}</option>)}
            </select>
            {activeMonths.length>0&&(
              <>
                <Lbl>Copy students from (optional)</Lbl>
                <select value={copyFromMonth} onChange={e=>setCopyFromMonth(e.target.value)}
                  style={{background:BG3,border:`1.5px solid ${G2}`,borderRadius:R_BTN,color:TXT,padding:"13px 14px",fontSize:16,outline:"none",width:"100%",marginBottom:8,WebkitAppearance:"none"}}>
                  <option value="">— Start empty —</option>
                  {activeMonths.map(({month,year})=>(
                    <option key={`${year}-${month}`} value={`${month}-${year}`}>{MONTHS[month]} {year}</option>
                  ))}
                </select>
                <div style={{color:G1,fontSize:12.5,marginBottom:22}}>Students are copied with payments reset to unpaid.</div>
              </>
            )}
            <div style={{display:"flex",gap:10}}>
              <OutBtn onClick={()=>setAddingMonth(false)} style={{flex:1,textAlign:"center"}}>Cancel</OutBtn>
              <YBtn onClick={()=>openMonth(newMonthIdx,NOW_YEAR,copyFromMonth||null)} style={{flex:2,textAlign:"center"}}>Open Month</YBtn>
            </div>
          </Overlay>
        )}
      </div>
    );
  }

  // ── Main menu (home) ──
  const latest=activeMonths.length?activeMonths[activeMonths.length-1]:{month:NOW_MONTH,year:NOW_YEAR};
  const hero=monthStats(latest.month,latest.year);
  const heroIncome=hero.paid*(TEACHER_PCT/100);
  const heroPct=hero.due>0?Math.min(100,Math.round((hero.paid/hero.due)*100)):0;
  const peopleCount=Object.keys(rosterByPid(groups)).length;
  const enterPerformance=()=>{ if(perfMonth==null){setPerfMonth(latest.month);setPerfYear(latest.year);} setView("performance"); };
  const sections=[
    {ico:"💳",bg:YSOFT,title:"Payments",sub:`Monthly fees · ${activeMonths.length} month${activeMonths.length!==1?"s":""} · ${peopleCount} students`,go:()=>setView("payments")},
    {ico:"📈",bg:"#E3F5EA",title:"Performance",sub:"Daily homework tracking · reports & charts",go:enterPerformance},
    {ico:"🗂️",bg:"#E7ECFF",title:"Student Portfolio",sub:`Contacts, study & living info · ${peopleCount} students`,go:()=>setView("portfolio")},
  ];
  return(
    <div style={{minHeight:"100vh",background:BG,padding:"calc(20px + var(--safe-top)) 16px 40px"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:22}}>
          <div style={{background:Y,borderRadius:14,width:52,height:52,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,boxShadow:SH1,flexShrink:0}}>🎓</div>
          <div style={{flex:1,minWidth:0}}>
            <h1 style={{margin:0,color:TXT,fontSize:24,fontWeight:900,letterSpacing:"-0.5px"}}>My Classes</h1>
            <p style={{margin:"3px 0 0",color:G1,fontSize:13}}>Educational Center</p>
          </div>
          <IconBtn onClick={()=>setMenuOpen(true)} label="Menu & backup" style={{background:BG2,boxShadow:SH1,fontSize:22,fontWeight:800}}>⋯</IconBtn>
        </div>

        <div style={{background:"#111",borderRadius:20,padding:"22px 24px",marginBottom:24,boxShadow:SH2,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-44,right:-34,width:150,height:150,borderRadius:"50%",background:"rgba(255,214,0,.13)"}}/>
          <div style={{position:"relative"}}>
            <div style={{color:"#ffffff99",fontSize:11,fontWeight:800,letterSpacing:"0.1em",marginBottom:8}}>YOUR INCOME · {MONTHS[latest.month].toUpperCase()} {latest.year}</div>
            <div style={{color:Y,fontSize:33,fontWeight:900,letterSpacing:"-1px",marginBottom:4}}>{fmt(heroIncome)}</div>
            <div style={{color:"#ffffff88",fontSize:12,marginBottom:18}}>{TEACHER_PCT}% of collected payments</div>
            <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
              {[["BILLED",fmt(hero.due)],["COLLECTED",fmt(hero.paid)],[`CENTER (${100-TEACHER_PCT}%)`,fmt(hero.paid*((100-TEACHER_PCT)/100))]].map(([l,v])=>(
                <div key={l}><div style={{color:"#ffffff77",fontSize:10,fontWeight:700,letterSpacing:"0.05em"}}>{l}</div><div style={{color:"#fff",fontWeight:800,fontSize:15,marginTop:3}}>{v}</div></div>
              ))}
            </div>
            <div style={{marginTop:16,height:6,background:"rgba(255,255,255,.15)",borderRadius:4}}>
              <div style={{height:"100%",borderRadius:4,background:Y,width:`${heroPct}%`,transition:"width .4s"}}/>
            </div>
            <div style={{color:"#ffffff77",fontSize:11,fontWeight:700,marginTop:6,textAlign:"right"}}>{heroPct}% collected</div>
          </div>
        </div>

        <Lbl>Sections</Lbl>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {sections.map(c=>(
            <div key={c.title} onClick={c.go} className="tap" style={{background:BG2,border:`1.5px solid ${G2}`,borderRadius:16,padding:20,display:"flex",alignItems:"center",gap:16,cursor:"pointer",boxShadow:SH1}}>
              <div style={{width:56,height:56,borderRadius:16,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{c.ico}</div>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontWeight:800,fontSize:18,color:TXT}}>{c.title}</div>
                <div style={{color:G1,fontSize:12.5,marginTop:3,lineHeight:1.4}}>{c.sub}</div>
              </div>
              <div style={{color:G1,fontSize:22,flexShrink:0}}>›</div>
            </div>
          ))}
        </div>

        <div style={{background:YSOFT,border:`1px solid ${YD}`,borderRadius:14,padding:"13px 15px",marginTop:16,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:17}}>🔗</span>
          <div style={{fontSize:12.5,color:"#5a4a00",lineHeight:1.5}}>All three sections share the <b>same students</b>. Add or delete a student once — it updates everywhere.</div>
        </div>
      </div>

      {saved&&<div style={{position:"fixed",bottom:"calc(26px + var(--safe-bottom))",left:"max(18px,var(--safe-left))",background:"#111",color:Y,borderRadius:20,padding:"7px 15px",fontSize:13,fontWeight:700,boxShadow:SH2,zIndex:901}}>✓ Saved</div>}

      {menuOpen&&(
        <Overlay onClose={()=>setMenuOpen(false)}>
          <div style={{fontWeight:800,fontSize:19,color:TXT,marginBottom:18}}>Data &amp; Backup</div>
          <button onClick={doBackup} style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:BG3,border:`1px solid ${G2}`,borderRadius:14,color:TXT,padding:"15px 16px",cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:10}}>
            <span style={{fontSize:20}}>⬇</span> Back up to file
          </button>
          <label style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:BG3,border:`1px solid ${G2}`,borderRadius:14,color:TXT,padding:"15px 16px",cursor:"pointer",fontSize:15,fontWeight:700}}>
            <span style={{fontSize:20}}>⬆</span> Restore from file
            <input type="file" accept=".json" onChange={doRestore} style={{display:"none"}}/>
          </label>
          {restoreMsg&&<div style={{color:restoreMsg.startsWith("✓")?GOOD:BAD,fontSize:14,fontWeight:700,marginTop:12}}>{restoreMsg}</div>}
          <div style={{color:G1,fontSize:12.5,marginTop:16,lineHeight:1.55}}>Your records are saved automatically on this device. Back up regularly so nothing is lost if your browser data is cleared. Backups now include performance & portfolio too.</div>
          <OutBtn onClick={()=>setMenuOpen(false)} style={{width:"100%",textAlign:"center",marginTop:18}}>Close</OutBtn>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
